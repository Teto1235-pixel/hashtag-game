<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hashtag Territory</title>
  <style>
    body { margin: 0; padding: 0; background: #fff; font-family: monospace; }
    #info { position: absolute; top: 10px; left: 10px; }
  </style>
</head>
<body>
  <div id="info">Загрузка...</div>

  <!-- Подключаем VK Bridge для взаимодействия с клиентом ВК -->
  <script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>

  <script>
    // Отправляем событие инициализации, чтобы ВК понял, что мы готовы
    vkBridge.send('VKWebAppInit').then(() => {
      console.log('Mini App инициализирован');
      // Получаем данные пользователя
      return vkBridge.send('VKWebAppGetUserInfo');
    }).then(data => {
      document.getElementById('info').textContent =
        `Привет, ${data.first_name}! Твой ID: ${data.id}`;
    }).catch(error => {
      document.getElementById('info').textContent = 'Ошибка: ' + error;
    });
  </script>
</body>
</html>
