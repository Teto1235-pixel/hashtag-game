<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>Hashtag Territory</title>
  <style>
    body { margin: 0; padding: 0; background: #fff; font-family: monospace; overflow: hidden; }
    canvas { display: block; width: 100%; height: auto; max-height: 100vh; }
    #info { position: absolute; top: 10px; left: 10px; z-index: 10; background: rgba(255,255,255,0.9); padding: 4px 8px; border-radius: 4px; }
    #legend { position: absolute; bottom: 20px; left: 20px; z-index: 10; background: rgba(255,255,255,0.9); padding: 8px 12px; border-radius: 8px; display: flex; align-items: center; gap: 8px; }
    #legendColor { width: 20px; height: 20px; border: 1px solid #333; }
    #selection { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; border: 1px solid #ccc; padding: 20px; z-index: 20; max-height: 80vh; overflow-y: auto; }
    #attackPanel { display: none; position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); background: white; border: 1px solid #ccc; padding: 15px; z-index: 20; text-align: center; }
    button { margin: 5px; padding: 8px 12px; cursor: pointer; font-family: monospace; }
    input[type=range] { width: 200px; }
  </style>
</head>
<body>
  <div id="info">Загрузка...</div>
  <div id="legend" style="display: none;">
    <div id="legendColor"></div>
    <span id="legendHashtag"></span>
  </div>
  <div id="selection">
    <h3>Выберите хештег</h3>
    <div id="hashtagList"></div>
  </div>
  <div id="attackPanel">
    <div>Цель: <span id="targetCoords"></span></div>
    <div>Сила атаки: <span id="powerValue">1</span></div>
    <input type="range" id="powerSlider" min="1" max="1" value="1">
    <br>
    <button id="attackBtn">Атаковать</button>
    <button id="cancelAttackBtn">Отмена</button>
  </div>
  <canvas id="gameCanvas"></canvas>

  <script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>
  <script>
    // ---------- НАСТРОЙКИ ----------
    const CELL_SIZE = 6;        // пикселей на клетку
    const MAP_W = 100;
    const MAP_H = 100;
    const SERVER_URL = 'https://here-vacation-mistress-region.trycloudflare.com'; // ваш адрес

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = MAP_W * CELL_SIZE;    // 600px
    canvas.height = MAP_H * CELL_SIZE;   // 600px

    // ---------- СОСТОЯНИЕ ----------
    const currentPlayer = {
      id: null,
      likes: 0,
      color: '#cccccc',
      hashtag: null
    };

    let map = Array(MAP_H).fill(null).map(() =>
      Array(MAP_W).fill().map(() => ({ ownerId: null, hashtag: '' }))
    );
    let playersInfo = {};  // словарь цветов и хештегов всех игроков

    // Кеш соседних для атаки клеток (множество строк "x,y")
    let adjacentSet = new Set();

    // UI-элементы
    const attackPanel = document.getElementById('attackPanel');
    const powerSlider = document.getElementById('powerSlider');
    const powerValue = document.getElementById('powerValue');
    const targetCoords = document.getElementById('targetCoords');
    let selectedTarget = null;

    const legend = document.getElementById('legend');
    const legendColor = document.getElementById('legendColor');
    const legendHashtag = document.getElementById('legendHashtag');

    // ---------- ПРОВЕРКА КАРТЫ ----------
    function isValidMap(m) {
      return Array.isArray(m) && m.length === MAP_H &&
             m[0] && m[0].length === MAP_W;
    }

    // Обновление множества соседних клеток
    function updateAdjacentSet() {
      adjacentSet.clear();
      if (!currentPlayer.id) return;
      for (let y = 0; y < MAP_H; y++) {
        for (let x = 0; x < MAP_W; x++) {
          const cell = map[y][x];
          if (cell.ownerId !== currentPlayer.id) {
            // Проверяем, есть ли соседняя своя клетка
            const dirs = [[0,-1],[0,1],[-1,0],[1,0]];
            for (const [dx,dy] of dirs) {
              const nx = x + dx, ny = y + dy;
              if (nx >=0 && nx < MAP_W && ny >=0 && ny < MAP_H) {
                if (map[ny][nx].ownerId === currentPlayer.id) {
                  adjacentSet.add(`${x},${y}`);
                  break;
                }
              }
            }
          }
        }
      }
    }

    // ---------- ОТРИСОВКА ----------
    function drawMap() {
      if (!isValidMap(map)) {
        console.error('Карта повреждена');
        updateInfo('Ошибка карты');
        return;
      }
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Сначала рисуем клетки
      for (let y = 0; y < MAP_H; y++) {
        for (let x = 0; x < MAP_W; x++) {
          const cell = map[y][x];
          const px = x * CELL_SIZE;
          const py = y * CELL_SIZE;

          if (cell.ownerId) {
            const ownerInfo = playersInfo[cell.ownerId];
            ctx.fillStyle = ownerInfo ? ownerInfo.color : '#cccccc';
            ctx.fillRect(px, py, CELL_SIZE, CELL_SIZE);
          } else {
            // Пустые клетки не закрашиваем, только сетка
          }
        }
      }

      // Поверх рисуем сетку (чтобы она была над цветом, но очень тонкая)
      ctx.strokeStyle = '#e0e0e0';
      ctx.lineWidth = 0.3;
      for (let y = 0; y <= MAP_H; y++) {
        ctx.beginPath();
        ctx.moveTo(0, y * CELL_SIZE);
        ctx.lineTo(MAP_W * CELL_SIZE, y * CELL_SIZE);
        ctx.stroke();
      }
      for (let x = 0; x <= MAP_W; x++) {
        ctx.beginPath();
        ctx.moveTo(x * CELL_SIZE, 0);
        ctx.lineTo(x * CELL_SIZE, MAP_H * CELL_SIZE);
        ctx.stroke();
      }

      // Подсветка соседних клеток
      if (currentPlayer.id && adjacentSet.size > 0) {
        ctx.strokeStyle = '#FFD700'; // золотистый
        ctx.lineWidth = 1.2;
        adjacentSet.forEach(coord => {
          const [cx, cy] = coord.split(',').map(Number);
          ctx.strokeRect(cx * CELL_SIZE, cy * CELL_SIZE, CELL_SIZE, CELL_SIZE);
        });
      }

      // Обновляем легенду
      if (currentPlayer.id && currentPlayer.hashtag) {
        legend.style.display = 'flex';
        legendColor.style.backgroundColor = currentPlayer.color;
        legendHashtag.textContent = '#' + currentPlayer.hashtag;
      } else {
        legend.style.display = 'none';
      }
    }

    function updateInfo(text) {
      document.getElementById('info').textContent = text;
    }

    // ---------- ОКНО ВЫБОРА ХЕШТЕГА ----------
    function showHashtagSelection(hashtags) {
      const listDiv = document.getElementById('hashtagList');
      listDiv.innerHTML = '';
      hashtags.forEach(tag => {
        const btn = document.createElement('button');
        btn.textContent = '#' + tag;
        btn.onclick = () => claimHashtag(tag);
        listDiv.appendChild(btn);
      });
      document.getElementById('selection').style.display = 'block';
    }

    function hideHashtagSelection() {
      document.getElementById('selection').style.display = 'none';
    }

    // ---------- ПАНЕЛЬ АТАКИ ----------
    function showAttackPanel(x, y) {
      selectedTarget = { x, y };
      targetCoords.textContent = `${x}, ${y}`;
      powerSlider.max = currentPlayer.likes;
      powerSlider.value = 1;
      powerValue.textContent = '1';
      attackPanel.style.display = 'block';
    }

    function hideAttackPanel() {
      attackPanel.style.display = 'none';
      selectedTarget = null;
    }

    powerSlider.addEventListener('input', () => {
      powerValue.textContent = powerSlider.value;
    });

    document.getElementById('attackBtn').addEventListener('click', () => {
      if (!selectedTarget) return;
      attackCell(selectedTarget.x, selectedTarget.y, Number(powerSlider.value));
      hideAttackPanel();
    });

    document.getElementById('cancelAttackBtn').addEventListener('click', hideAttackPanel);

    // ---------- ЗАПРОСЫ К СЕРВЕРУ ----------
    function applyServerResponse(data) {
      if (data.player) {
        currentPlayer.likes = data.player.likes;
        if (currentPlayer.hashtag === null) currentPlayer.hashtag = data.player.hashtag;
      }
      if (isValidMap(data.map)) map = data.map;
      if (data.playersInfo) playersInfo = data.playersInfo;
      updateAdjacentSet();
      drawMap();
      updateInfo(`Лайков: ${currentPlayer.likes}`);
    }

    function claimHashtag(hashtag) {
      fetch(`${SERVER_URL}/claim`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ userId: currentPlayer.id, hashtag })
      })
      .then(r => r.json())
      .then(res => {
        if (res.success) {
          currentPlayer.color = res.player.color;
          applyServerResponse(res);
          hideHashtagSelection();
        } else {
          alert(res.error);
        }
      });
    }

    function attackCell(gridX, gridY, amount) {
      fetch(`${SERVER_URL}/attack`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ userId: currentPlayer.id, x: gridX, y: gridY, amount })
      })
      .then(r => r.json())
      .then(res => {
        if (res.success) {
          applyServerResponse(res);
        } else {
          updateInfo(`Ошибка: ${res.error}`);
          applyServerResponse(res); // всё равно обновляем (лайки могли потратиться)
        }
      });
    }

    function fetchState() {
      if (!currentPlayer.id) return;
      fetch(`${SERVER_URL}/state`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ userId: currentPlayer.id })
      })
      .then(r => r.json())
      .then(data => applyServerResponse(data));
    }

    // ---------- ИНИЦИАЛИЗАЦИЯ ----------
    vkBridge.send('VKWebAppInit')
      .then(() => vkBridge.send('VKWebAppGetUserInfo'))
      .then(data => {
        currentPlayer.id = data.id;
        updateInfo(`Привет, ${data.first_name}!`);
        return fetch(`${SERVER_URL}/join`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ userId: data.id })
        });
      })
      .then(r => r.json())
      .then(state => {
        currentPlayer.color = state.player.color;
        applyServerResponse(state);
        if (!currentPlayer.hashtag && state.availableHashtags) {
          showHashtagSelection(state.availableHashtags);
        }
      })
      .catch(error => {
        updateInfo('Ошибка: ' + error);
        console.error(error);
      });

    // ---------- ОБРАБОТКА КЛИКОВ ----------
    canvas.addEventListener('click', (e) => {
      if (!currentPlayer.hashtag) return;
      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width / rect.width;
      const scaleY = canvas.height / rect.height;
      const mouseX = (e.clientX - rect.left) * scaleX;
      const mouseY = (e.clientY - rect.top) * scaleY;
      const gridX = Math.floor(mouseX / CELL_SIZE);
      const gridY = Math.floor(mouseY / CELL_SIZE);
      if (gridX < 0 || gridX >= MAP_W || gridY < 0 || gridY >= MAP_H) return;

      // Проверяем, что клетка доступна для атаки
      if (!adjacentSet.has(`${gridX},${gridY}`)) {
        updateInfo('Можно атаковать только подсвеченные клетки');
        return;
      }

      showAttackPanel(gridX, gridY);
    });

    // ---------- ПЕРИОДИЧЕСКОЕ ОБНОВЛЕНИЕ ----------
    setInterval(fetchState, 10_000);
  </script>
</body>
</html>
