<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>Hashtag Territory</title>
  <style>
    body {
      margin: 0; padding: 0; background: #222;
      font-family: 'Courier New', monospace;
      overflow: hidden; touch-action: manipulation;
    }
    #canvasContainer {
      width: 100%; height: 100vh;
      display: flex; justify-content: center; align-items: center;
    }
    canvas { display: block; max-width: 100%; max-height: 100%; touch-action: none; }
    #info { position: absolute; top: 10px; left: 10px; z-index: 10; background: rgba(255,255,255,0.9); padding: 4px 8px; border-radius: 4px; }
    #legend { position: absolute; bottom: 20px; left: 20px; z-index: 10; background: rgba(255,255,255,0.9); padding: 8px 12px; border-radius: 8px; display: none; align-items: center; gap: 8px; }
    #legendColor { width: 20px; height: 20px; border: 1px solid #333; }
    #homeBtn { position: absolute; bottom: 20px; right: 20px; z-index: 10; background: rgba(255,255,255,0.9); border: 1px solid #ccc; padding: 8px 12px; border-radius: 8px; font-size: 16px; cursor: pointer; display: none; }
    #leaderboard { position: absolute; top: 10px; right: 10px; z-index: 10; background: rgba(0,0,0,0.5); color: white; padding: 8px 12px; border-radius: 8px; max-width: 200px; font-size: 12px; display: none; }
    .leader-item { display: flex; align-items: center; margin-bottom: 4px; }
    .leader-color { width: 10px; height: 10px; margin-right: 5px; border: 1px solid #fff; }
    .leader-tag { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .leader-cells { margin-left: 5px; }
    #selection { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; border: 1px solid #ccc; padding: 20px; z-index: 20; max-height: 80vh; overflow-y: auto; }
    #attackPanel { display: none; position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); background: white; border: 1px solid #ccc; padding: 15px; z-index: 20; text-align: center; }
    button { margin: 5px; padding: 8px 12px; cursor: pointer; font-family: 'Courier New', monospace; }
    input[type=range] { width: 200px; }
  </style>
</head>
<body>
  <div id="info">Загрузка...</div>
  <div id="legend">
    <div id="legendColor"></div>
    <span id="legendHashtag"></span>
  </div>
  <button id="homeBtn" title="Мои владения">🏠 Мои клетки</button>
  <div id="leaderboard"></div>
  <div id="selection">
    <h3>Выберите хештег</h3>
    <div id="hashtagList"></div>
  </div>
  <div id="attackPanel">
    <div>Цель: <span id="targetCoords"></span></div>
    <div>Захватить клеток: <span id="powerValue">1</span></div>
    <input type="range" id="powerSlider" min="1" max="1" value="1">
    <br>
    <button id="attackBtn">Атаковать</button>
    <button id="cancelAttackBtn">Отмена</button>
  </div>
  <div id="canvasContainer">
    <canvas id="gameCanvas"></canvas>
  </div>

  <script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>
  <script>
    // ---------- НАСТРОЙКИ ----------
    const CELL_SIZE = 8;          // немного крупнее для читаемости
    let MAP_W = 200;
    let MAP_H = 200;
    const SERVER_URL = 'https://here-vacation-mistress-region.trycloudflare.com'; // замените

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    function resizeCanvas() {
      const container = document.getElementById('canvasContainer');
      canvas.width = container.clientWidth;
      canvas.height = container.clientHeight;
      clampCamera();
      drawMap();
    }
    window.addEventListener('resize', resizeCanvas);

    // ---------- СОСТОЯНИЕ ИГРЫ ----------
    const currentPlayer = {
      id: null, likes: 0, color: '#cccccc', hashtag: null, spawnX: 0, spawnY: 0
    };
    let map = Array(MAP_H).fill(null).map(() => Array(MAP_W).fill().map(() => ({ ownerId: null, hashtag: '' })));
    let playersInfo = {};
    let adjacentSet = new Set();
    let leaderboard = [];

    let animating = false;
    let animationQueue = [];
    let animationTimer = null;

    let viewX = 0, viewY = 0, zoom = 1;
    const MIN_ZOOM = 0.3, MAX_ZOOM = 5;

    // UI элементы
    const attackPanel = document.getElementById('attackPanel');
    const powerSlider = document.getElementById('powerSlider');
    const powerValue = document.getElementById('powerValue');
    const targetCoords = document.getElementById('targetCoords');
    const legend = document.getElementById('legend');
    const legendColor = document.getElementById('legendColor');
    const legendHashtag = document.getElementById('legendHashtag');
    const homeBtn = document.getElementById('homeBtn');
    const leaderboardDiv = document.getElementById('leaderboard');
    let selectedTarget = null;

    // Блокировка системного зума
    document.addEventListener('gesturestart', e => e.preventDefault());
    document.addEventListener('gesturechange', e => e.preventDefault());
    document.addEventListener('gestureend', e => e.preventDefault());

    // ---------- КАМЕРА С ГИБКИМИ ОГРАНИЧЕНИЯМИ ----------
    function clampCamera() {
      const worldW = MAP_W * CELL_SIZE;
      const worldH = MAP_H * CELL_SIZE;
      const visibleW = canvas.width / zoom;
      const visibleH = canvas.height / zoom;

      // Если мир меньше видимой области — разрешаем отрицательные значения,
      // чтобы карта могла центрироваться или смещаться, но не отрываться от краёв.
      if (worldW <= visibleW) {
        viewX = Math.max(worldW - visibleW, Math.min(0, viewX));
      } else {
        viewX = Math.max(0, Math.min(viewX, worldW - visibleW));
      }
      if (worldH <= visibleH) {
        viewY = Math.max(worldH - visibleH, Math.min(0, viewY));
      } else {
        viewY = Math.max(0, Math.min(viewY, worldH - visibleH));
      }
    }

    function isValidMap(m) {
      return Array.isArray(m) && m.length === MAP_H && m[0]?.length === MAP_W;
    }

    function updateAdjacentSet() {
      adjacentSet.clear();
      if (!currentPlayer.id) return;
      for (let y = 0; y < MAP_H; y++) {
        for (let x = 0; x < MAP_W; x++) {
          if (map[y][x].ownerId !== currentPlayer.id) {
            const dirs = [[0,-1],[0,1],[-1,0],[1,0]];
            for (const [dx, dy] of dirs) {
              const nx = x + dx, ny = y + dy;
              if (nx >= 0 && nx < MAP_W && ny >= 0 && ny < MAP_H && map[ny][nx].ownerId === currentPlayer.id) {
                adjacentSet.add(`${x},${y}`);
                break;
              }
            }
          }
        }
      }
    }

    // ---------- ОТРИСОВКА С ТЕКСТОМ ----------
    function drawMap() {
      if (!isValidMap(map)) return;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.save();
      ctx.translate(-viewX, -viewY);
      ctx.scale(zoom, zoom);

      // Фон мира
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, MAP_W * CELL_SIZE, MAP_H * CELL_SIZE);

      // Клетки
      for (let y = 0; y < MAP_H; y++) {
        for (let x = 0; x < MAP_W; x++) {
          const cell = map[y][x];
          const px = x * CELL_SIZE;
          const py = y * CELL_SIZE;
          if (cell.ownerId) {
            const ownerInfo = playersInfo[cell.ownerId];
            ctx.fillStyle = ownerInfo ? ownerInfo.color : '#cccccc';
            ctx.fillRect(px, py, CELL_SIZE, CELL_SIZE);
          }
        }
      }

      // Сетка
      ctx.strokeStyle = '#e0e0e0';
      ctx.lineWidth = 0.3 / zoom;
      for (let i = 0; i <= MAP_H; i++) {
        ctx.beginPath();
        ctx.moveTo(0, i * CELL_SIZE);
        ctx.lineTo(MAP_W * CELL_SIZE, i * CELL_SIZE);
        ctx.stroke();
      }
      for (let i = 0; i <= MAP_W; i++) {
        ctx.beginPath();
        ctx.moveTo(i * CELL_SIZE, 0);
        ctx.lineTo(i * CELL_SIZE, MAP_H * CELL_SIZE);
        ctx.stroke();
      }

      // Подсветка соседей
      if (!animating && currentPlayer.id && adjacentSet.size > 0) {
        ctx.strokeStyle = '#FFD700';
        ctx.lineWidth = 1.5 / zoom;
        adjacentSet.forEach(coord => {
          const [cx, cy] = coord.split(',').map(Number);
          ctx.strokeRect(cx * CELL_SIZE, cy * CELL_SIZE, CELL_SIZE, CELL_SIZE);
        });
      }

      // Полупрозрачные названия хештегов на своих клетках
      if (currentPlayer.id && currentPlayer.hashtag) {
        ctx.fillStyle = 'rgba(0,0,0,0.55)';
        // Размер шрифта зависит от клетки и масштаба: базовая высота = CELL_SIZE * 0.6
        const fontSize = Math.max(1, CELL_SIZE * 0.55);
        ctx.font = `${fontSize}px "Courier New", monospace`;
        ctx.textBaseline = 'bottom';
        for (let y = 0; y < MAP_H; y++) {
          for (let x = 0; x < MAP_W; x++) {
            const cell = map[y][x];
            if (cell.ownerId === currentPlayer.id) {
              const tag = cell.hashtag || currentPlayer.hashtag;
              ctx.fillText(tag, x * CELL_SIZE + 1, (y + 1) * CELL_SIZE - 1);
            }
          }
        }
      }

      ctx.restore();

      // Легенда и кнопка
      if (currentPlayer.id && currentPlayer.hashtag) {
        legend.style.display = 'flex';
        legendColor.style.backgroundColor = currentPlayer.color;
        legendHashtag.textContent = '#' + currentPlayer.hashtag;
        homeBtn.style.display = 'block';
      } else {
        legend.style.display = 'none';
        homeBtn.style.display = 'none';
      }

      updateLeaderboard();
    }

    function updateLeaderboard() {
      if (!leaderboard.length) {
        leaderboardDiv.style.display = 'none';
        return;
      }
      leaderboardDiv.style.display = 'block';
      let html = '<strong>Топ-10</strong>';
      leaderboard.forEach(entry => {
        html += `<div class="leader-item">
          <div class="leader-color" style="background:${entry.color}"></div>
          <span class="leader-tag">#${entry.hashtag}</span>
          <span class="leader-cells">${entry.cells}</span>
        </div>`;
      });
      leaderboardDiv.innerHTML = html;
    }

    function updateInfo(text) {
      document.getElementById('info').textContent = text;
    }

    // Анимация захвата
    function animateCapture(cells, serverMap) {
      if (!cells.length) {
        map = serverMap;
        updateAdjacentSet();
        drawMap();
        updateInfo(`Лайков: ${currentPlayer.likes}`);
        animating = false;
        return;
      }
      animating = true;
      animationQueue = [...cells];
      map = serverMap;
      function step() {
        if (!animationQueue.length) {
          animating = false;
          updateAdjacentSet();
          drawMap();
          updateInfo(`Лайков: ${currentPlayer.likes}`);
          return;
        }
        drawMap();
        animationQueue.shift();
        animationTimer = setTimeout(step, 200);
      }
      step();
    }

    // Центрирование на своих клетках
    function centerOnMyCells() {
      let sumX = 0, sumY = 0, count = 0;
      for (let y = 0; y < MAP_H; y++) {
        for (let x = 0; x < MAP_W; x++) {
          if (map[y][x].ownerId === currentPlayer.id) {
            sumX += x;
            sumY += y;
            count++;
          }
        }
      }
      if (count > 0) {
        centerOn(Math.floor(sumX / count), Math.floor(sumY / count));
      } else {
        centerOn(currentPlayer.spawnX, currentPlayer.spawnY);
      }
    }

    function centerOn(worldX, worldY) {
      const targetWorldX = worldX * CELL_SIZE + CELL_SIZE/2;
      const targetWorldY = worldY * CELL_SIZE + CELL_SIZE/2;
      viewX = targetWorldX - canvas.width / (2 * zoom);
      viewY = targetWorldY - canvas.height / (2 * zoom);
      clampCamera();
      drawMap();
    }

    homeBtn.addEventListener('click', centerOnMyCells);

    // Экран -> мировые координаты
    function screenToWorld(sx, sy) {
      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width / rect.width;
      const scaleY = canvas.height / rect.height;
      const cx = (sx - rect.left) * scaleX;
      const cy = (sy - rect.top) * scaleY;
      return {
        x: Math.floor((cx + viewX) / zoom / CELL_SIZE),
        y: Math.floor((cy + viewY) / zoom / CELL_SIZE)
      };
    }

    // ---------- DRAG & ZOOM ----------
    let isDragging = false, dragStartX, dragStartY, dragStartViewX, dragStartViewY;
    canvas.addEventListener('mousedown', e => {
      if (e.button === 0 && !e.ctrlKey) {
        isDragging = true;
        dragStartX = e.clientX;
        dragStartY = e.clientY;
        dragStartViewX = viewX;
        dragStartViewY = viewY;
        canvas.style.cursor = 'grabbing';
        e.preventDefault();
      }
    });
    window.addEventListener('mousemove', e => {
      if (!isDragging) return;
      viewX = dragStartViewX - (e.clientX - dragStartX) / zoom;
      viewY = dragStartViewY - (e.clientY - dragStartY) / zoom;
      clampCamera();
      drawMap();
    });
    window.addEventListener('mouseup', () => {
      isDragging = false;
      canvas.style.cursor = 'default';
    });
    canvas.addEventListener('wheel', e => {
      e.preventDefault();
      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width / rect.width;
      const scaleY = canvas.height / rect.height;
      const mouseCanvasX = (e.clientX - rect.left) * scaleX;
      const mouseCanvasY = (e.clientY - rect.top) * scaleY;
      const worldX = (mouseCanvasX + viewX) / zoom;
      const worldY = (mouseCanvasY + viewY) / zoom;
      const newZoom = Math.min(MAX_ZOOM, Math.max(MIN_ZOOM, zoom * (e.deltaY > 0 ? 0.9 : 1.1)));
      if (newZoom !== zoom) {
        viewX = worldX * newZoom - mouseCanvasX;
        viewY = worldY * newZoom - mouseCanvasY;
        zoom = newZoom;
        clampCamera();
        drawMap();
      }
    });

    // Тач-управление
    let lastTouches = null;
    canvas.addEventListener('touchstart', e => {
      e.preventDefault();
      const touches = e.touches;
      if (touches.length === 1) {
        isDragging = true;
        dragStartX = touches[0].clientX;
        dragStartY = touches[0].clientY;
        dragStartViewX = viewX;
        dragStartViewY = viewY;
      } else if (touches.length === 2) {
        isDragging = false;
        lastTouches = {
          dist: Math.hypot(touches[0].clientX - touches[1].clientX, touches[0].clientY - touches[1].clientY),
          cx: (touches[0].clientX + touches[1].clientX)/2,
          cy: (touches[0].clientY + touches[1].clientY)/2,
          viewX, viewY, zoom
        };
      }
    });
    canvas.addEventListener('touchmove', e => {
      e.preventDefault();
      const touches = e.touches;
      if (touches.length === 1 && isDragging) {
        viewX = dragStartViewX - (touches[0].clientX - dragStartX) / zoom;
        viewY = dragStartViewY - (touches[0].clientY - dragStartY) / zoom;
        clampCamera();
        drawMap();
      } else if (touches.length === 2 && lastTouches) {
        const newDist = Math.hypot(touches[0].clientX - touches[1].clientX, touches[0].clientY - touches[1].clientY);
        const scale = newDist / lastTouches.dist;
        const newZoom = Math.min(MAX_ZOOM, Math.max(MIN_ZOOM, lastTouches.zoom * scale));
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width, scaleY = canvas.height / rect.height;
        const canvasCX = (lastTouches.cx - rect.left) * scaleX;
        const canvasCY = (lastTouches.cy - rect.top) * scaleY;
        const worldX = (canvasCX + lastTouches.viewX) / lastTouches.zoom;
        const worldY = (canvasCY + lastTouches.viewY) / lastTouches.zoom;
        zoom = newZoom;
        viewX = worldX * zoom - canvasCX;
        viewY = worldY * zoom - canvasCY;
        lastTouches = { dist: newDist, cx: lastTouches.cx, cy: lastTouches.cy, viewX, viewY, zoom };
        clampCamera();
        drawMap();
      }
    });
    canvas.addEventListener('touchend', e => {
      if (e.touches.length === 0) { isDragging = false; lastTouches = null; }
    });

    // ---------- АТАКА ----------
    canvas.addEventListener('click', e => {
      if (isDragging || animating) return;
      if (!currentPlayer.hashtag) return;
      const { x, y } = screenToWorld(e.clientX, e.clientY);
      if (x < 0 || x >= MAP_W || y < 0 || y >= MAP_H) return;
      if (!adjacentSet.has(`${x},${y}`)) {
        updateInfo('Можно атаковать только подсвеченные клетки');
        return;
      }
      showAttackPanel(x, y);
    });

    function showAttackPanel(x, y) {
      selectedTarget = { x, y };
      targetCoords.textContent = `${x}, ${y}`;
      powerSlider.max = currentPlayer.likes;
      powerSlider.value = 1;
      powerValue.textContent = '1';
      attackPanel.style.display = 'block';
    }
    function hideAttackPanel() {
      attackPanel.style.display = 'none';
      selectedTarget = null;
    }
    powerSlider.addEventListener('input', () => powerValue.textContent = powerSlider.value);
    document.getElementById('attackBtn').addEventListener('click', () => {
      if (!selectedTarget || animating) return;
      attackCell(selectedTarget.x, selectedTarget.y, Number(powerSlider.value));
      hideAttackPanel();
    });
    document.getElementById('cancelAttackBtn').addEventListener('click', hideAttackPanel);

    // ---------- СЕРВЕРНЫЕ ЗАПРОСЫ ----------
    function applyServerResponse(data, capturedCells) {
      if (data.player) {
        currentPlayer.likes = data.player.likes;
        if (!currentPlayer.hashtag) currentPlayer.hashtag = data.player.hashtag;
        if (data.player.spawnX !== undefined) {
          currentPlayer.spawnX = data.player.spawnX;
          currentPlayer.spawnY = data.player.spawnY;
        }
      }
      if (data.playersInfo) playersInfo = data.playersInfo;
      if (data.worldW) MAP_W = data.worldW;
      if (data.worldH) MAP_H = data.worldH;
      if (data.leaderboard) leaderboard = data.leaderboard;

      if (capturedCells?.length) {
        animateCapture(capturedCells, data.map);
      } else {
        if (isValidMap(data.map)) map = data.map;
        updateAdjacentSet();
        drawMap();
        updateInfo(`Лайков: ${currentPlayer.likes}`);
      }
    }

    function claimHashtag(hashtag) {
      fetch(`${SERVER_URL}/claim`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ userId: currentPlayer.id, hashtag })
      })
      .then(r => r.json())
      .then(res => {
        if (res.success) {
          currentPlayer.color = res.player.color;
          currentPlayer.spawnX = res.player.spawnX;
          currentPlayer.spawnY = res.player.spawnY;
          applyServerResponse(res, null);
          hideHashtagSelection();
          centerOn(currentPlayer.spawnX, currentPlayer.spawnY);
        } else alert(res.error);
      });
    }

    function attackCell(x, y, amount) {
      fetch(`${SERVER_URL}/attack`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ userId: currentPlayer.id, x, y, amount })
      })
      .then(r => r.json())
      .then(res => {
        if (res.success) applyServerResponse(res, res.capturedCells);
        else {
          updateInfo(`Ошибка: ${res.error}`);
          applyServerResponse(res, null);
        }
      });
    }

    function fetchState() {
      if (!currentPlayer.id || animating) return;
      fetch(`${SERVER_URL}/state`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ userId: currentPlayer.id })
      })
      .then(r => r.json())
      .then(data => applyServerResponse(data, null));
    }

    function showHashtagSelection(hashtags) {
      const listDiv = document.getElementById('hashtagList');
      listDiv.innerHTML = '';
      hashtags.forEach(tag => {
        const btn = document.createElement('button');
        btn.textContent = '#' + tag;
        btn.onclick = () => claimHashtag(tag);
        listDiv.appendChild(btn);
      });
      document.getElementById('selection').style.display = 'block';
    }
    function hideHashtagSelection() {
      document.getElementById('selection').style.display = 'none';
    }

    // ---------- СТАРТ ----------
    vkBridge.send('VKWebAppInit')
      .then(() => vkBridge.send('VKWebAppGetUserInfo'))
      .then(data => {
        currentPlayer.id = data.id;
        updateInfo(`Привет, ${data.first_name}!`);
        return fetch(`${SERVER_URL}/join`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ userId: data.id })
        });
      })
      .then(r => r.json())
      .then(state => {
        currentPlayer.color = state.player.color;
        currentPlayer.spawnX = state.player.spawnX;
        currentPlayer.spawnY = state.player.spawnY;
        MAP_W = state.worldW || MAP_W;
        MAP_H = state.worldH || MAP_H;
        leaderboard = state.leaderboard || [];
        applyServerResponse(state, null);
        if (!currentPlayer.hashtag && state.availableHashtags) {
          showHashtagSelection(state.availableHashtags);
        }
        resizeCanvas();
        if (currentPlayer.spawnX !== null) centerOn(currentPlayer.spawnX, currentPlayer.spawnY);
      })
      .catch(err => {
        updateInfo('Ошибка: ' + err);
        console.error(err);
      });

    setInterval(fetchState, 10_000);
    resizeCanvas();
    drawMap();
  </script>
</body>
</html>
