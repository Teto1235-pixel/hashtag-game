<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hashtag Territory</title>
  <style>
    body { margin: 0; padding: 0; background: #fff; font-family: monospace; overflow: hidden; }
    #info { position: absolute; top: 10px; left: 10px; z-index: 10; background: rgba(255,255,255,0.9); padding: 4px 8px; border-radius: 4px; }
    #selection { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; border: 1px solid #ccc; padding: 20px; z-index: 20; max-height: 80vh; overflow-y: auto; }
    canvas { display: block; }
    button { margin: 5px; padding: 8px 12px; cursor: pointer; font-family: monospace; }
  </style>
</head>
<body>
  <div id="info">Загрузка...</div>
  <div id="selection">
    <h3>Выберите хештег</h3>
    <div id="hashtagList"></div>
  </div>
  <canvas id="gameCanvas"></canvas>

  <script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>
  <script>
    // ---------- НАСТРОЙКИ ----------
    const CELL_SIZE = 20;
    const MAP_W = 40;
    const MAP_H = 30;
    const SERVER_URL = 'https://here-vacation-mistress-region.trycloudflare.com'; // замените на свой

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = MAP_W * CELL_SIZE;
    canvas.height = MAP_H * CELL_SIZE;

    // ---------- СОСТОЯНИЕ ИГРОКА ----------
    const currentPlayer = {
      id: null,
      likes: 0,
      color: '#cccccc',
      hashtag: null
    };

    // Начальная пустая карта (на случай, если сервер не ответит)
    let map = Array(MAP_H).fill(null).map(() =>
      Array(MAP_W).fill().map(() => ({ ownerId: null, hashtag: '' }))
    );

    // ---------- ПРОВЕРКА КАРТЫ ----------
    function isValidMap(m) {
      return Array.isArray(m) && m.length === MAP_H &&
             m[0] && m[0].length === MAP_W;
    }

    // ---------- ОТРИСОВКА ----------
    function drawMap() {
      if (!isValidMap(map)) {
        console.error('Карта повреждена:', map);
        updateInfo('Ошибка карты, перезагрузите');
        return;
      }
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      for (let y = 0; y < MAP_H; y++) {
        for (let x = 0; x < MAP_W; x++) {
          const cell = map[y][x];
          if (!cell || typeof cell.ownerId === 'undefined') {
            console.warn(`Нет клетки в [${y}][${x}]`, cell);
            continue;
          }
          const px = x * CELL_SIZE;
          const py = y * CELL_SIZE;
          if (cell.ownerId) {
            ctx.fillStyle = (currentPlayer.id && cell.ownerId === currentPlayer.id)
              ? currentPlayer.color : '#cccccc';
            ctx.fillRect(px, py, CELL_SIZE, CELL_SIZE);
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 1;
            ctx.strokeRect(px, py, CELL_SIZE, CELL_SIZE);
            ctx.fillStyle = '#000000';
            ctx.font = '8px monospace';
            ctx.fillText(cell.hashtag.substring(0, 4), px + 2, py + 10);
          } else {
            ctx.strokeStyle = '#e0e0e0';
            ctx.lineWidth = 0.5;
            ctx.strokeRect(px, py, CELL_SIZE, CELL_SIZE);
          }
        }
      }
    }

    function updateInfo(text) {
      document.getElementById('info').textContent = text;
    }

    // ---------- ОКНО ВЫБОРА ХЕШТЕГА ----------
    function showHashtagSelection(hashtags) {
      const listDiv = document.getElementById('hashtagList');
      listDiv.innerHTML = '';
      hashtags.forEach(tag => {
        const btn = document.createElement('button');
        btn.textContent = '#' + tag;
        btn.onclick = () => claimHashtag(tag);
        listDiv.appendChild(btn);
      });
      document.getElementById('selection').style.display = 'block';
    }

    function hideHashtagSelection() {
      document.getElementById('selection').style.display = 'none';
    }

    // ---------- ЗАПРОСЫ К СЕРВЕРУ ----------
    function claimHashtag(hashtag) {
      fetch(`${SERVER_URL}/claim`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ userId: currentPlayer.id, hashtag })
      })
      .then(r => r.json())
      .then(res => {
        if (res.success) {
          currentPlayer.hashtag = res.player.hashtag;
          currentPlayer.likes = res.player.likes;
          if (isValidMap(res.map)) map = res.map;
          else console.error('Сервер вернул битую карту:', res.map);
          hideHashtagSelection();
          drawMap();
          updateInfo(`Хештег #${hashtag} выбран. Лайков: ${currentPlayer.likes}`);
        } else {
          alert(res.error);
        }
      });
    }

    function attackCell(gridX, gridY) {
      fetch(`${SERVER_URL}/attack`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ userId: currentPlayer.id, x: gridX, y: gridY, amount: 1 })
      })
      .then(r => r.json())
      .then(res => {
        if (res.success) {
          if (isValidMap(res.map)) map = res.map;
          else console.error('Сервер вернул битую карту:', res.map);
          currentPlayer.likes = res.player.likes;
          drawMap();
          updateInfo(`Лайков: ${currentPlayer.likes}`);
        } else {
          updateInfo(`Ошибка: ${res.error}`);
          // Обновляем карту и лайки, даже если атака не удалась
          if (isValidMap(res.map)) map = res.map;
          if (res.player) currentPlayer.likes = res.player.likes;
          drawMap();
        }
      });
    }

    function fetchState() {
      if (!currentPlayer.id) return;
      fetch(`${SERVER_URL}/state`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ userId: currentPlayer.id })
      })
      .then(r => r.json())
      .then(data => {
        if (data.player) {
          currentPlayer.likes = data.player.likes;
          if (currentPlayer.hashtag === null) currentPlayer.hashtag = data.player.hashtag;
        }
        if (isValidMap(data.map)) map = data.map;
        drawMap();
        updateInfo(`Лайков: ${currentPlayer.likes}`);
      });
    }

    // ---------- ИНИЦИАЛИЗАЦИЯ ----------
    vkBridge.send('VKWebAppInit')
      .then(() => vkBridge.send('VKWebAppGetUserInfo'))
      .then(data => {
        currentPlayer.id = data.id;
        updateInfo(`Привет, ${data.first_name}!`);
        return fetch(`${SERVER_URL}/join`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ userId: data.id })
        });
      })
      .then(r => r.json())
      .then(state => {
        currentPlayer.likes = state.player.likes;
        currentPlayer.color = state.player.color;
        currentPlayer.hashtag = state.player.hashtag;
        if (isValidMap(state.map)) map = state.map;
        drawMap();

        if (!currentPlayer.hashtag && state.availableHashtags) {
          showHashtagSelection(state.availableHashtags);
        } else {
          updateInfo(`Лайков: ${currentPlayer.likes}`);
        }
      })
      .catch(error => {
        updateInfo('Ошибка: ' + error);
        console.error(error);
      });

    // ---------- ОБРАБОТКА КЛИКОВ ----------
    canvas.addEventListener('click', (e) => {
      if (!currentPlayer.hashtag) return;
      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width / rect.width;
      const scaleY = canvas.height / rect.height;
      const mouseX = (e.clientX - rect.left) * scaleX;
      const mouseY = (e.clientY - rect.top) * scaleY;
      const gridX = Math.floor(mouseX / CELL_SIZE);
      const gridY = Math.floor(mouseY / CELL_SIZE);
      if (gridX < 0 || gridX >= MAP_W || gridY < 0 || gridY >= MAP_H) return;
      attackCell(gridX, gridY);
    });

    // ---------- ПЕРИОДИЧЕСКОЕ ОБНОВЛЕНИЕ ЛАЙКОВ ----------
    setInterval(fetchState, 10_000); // каждые 10 секунд
  </script>
</body>
</html>
