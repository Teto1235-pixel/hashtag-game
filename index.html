<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>Hashtag Territory</title>
  <style>
    body {
      margin: 0; padding: 0; background: #222;
      font-family: 'Courier New', monospace;
      overflow: hidden;
      touch-action: manipulation;
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    }
    #canvasContainer { width: 100%; height: 100vh; display: flex; justify-content: center; align-items: center; }
    canvas { display: block; width: 100%; height: 100%; touch-action: none; }
    #info, #legend, #menuBtn, #leaderboard, #menuPanel, #selection, #attackPanel, #gameover, #gameEndScreen { position: absolute; z-index: 10; }
    #info { top:10px; left:10px; background:rgba(255,255,255,0.9); padding:4px 8px; border-radius:4px; }
    #legend { bottom:20px; left:20px; background:rgba(255,255,255,0.9); padding:8px 12px; border-radius:8px; display:none; align-items:center; gap:8px; }
    #legendColor { width:20px; height:20px; border:1px solid #333; }
    #menuBtn { bottom:20px; right:20px; background:rgba(255,255,255,0.9); border:1px solid #ccc; padding:8px 12px; border-radius:8px; font-size:16px; cursor:pointer; display:none; }
    #leaderboard { top:10px; right:10px; background:rgba(0,0,0,0.5); color:white; padding:8px 12px; border-radius:8px; max-width:200px; font-size:12px; display:none; }
    .leader-item { display:flex; align-items:center; margin-bottom:4px; }
    .leader-color { width:10px; height:10px; margin-right:5px; border:1px solid #fff; }
    .leader-tag { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .leader-cells { margin-left:5px; }
    #menuPanel, #selection { display:none; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); background:white; border:1px solid #ccc; padding:20px; z-index:20; }
    #menuPanel { text-align:center; }
    #selection { max-height:80vh; overflow-y:auto; }
    #hashtagList { max-height: 50vh; overflow-y: auto; margin-bottom: 10px; }
    #selection button.taken { background:#ffcccc; color:#900; cursor:not-allowed; text-decoration:line-through; }
    #attackPanel { display:none; position:absolute; bottom:20px; left:50%; transform:translateX(-50%); background:white; border:1px solid #ccc; padding:15px; z-index:20; text-align:center; }
    #gameover { display:none; position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:100; justify-content:center; align-items:center; flex-direction:column; color:white; font-size:24px; }
    #gameEndScreen { display:none; position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:100; justify-content:center; align-items:center; flex-direction:column; color:white; font-size:24px; }
    #gameEndScreen .leaderboard { margin-top:20px; font-size:18px; }
    button { margin:5px; padding:8px 12px; cursor:pointer; font-family:'Courier New',monospace; }
    input[type=range] { width:200px; }
    @media (hover: none) and (pointer: coarse) { input[type=range] { width: 160px; height: 30px; } }
    #attackControls { display: flex; align-items: center; justify-content: center; gap: 8px; }
    #alertToast {
      position: absolute; top: 36px; left: 10px;
      background: rgba(0,0,0,0.85); color: #FFD700;
      padding: 2px 10px; border-radius: 12px; font-size: 12px;
      z-index: 30; display: none;
      font-family: 'Courier New', monospace; white-space: nowrap;
    }
    .faction-layout { display: flex; gap: 15px; text-align: left; }
    .faction-left { flex: 1; min-width: 200px; }
    .faction-right { flex: 1; min-width: 200px; }
    #factionChatMessages { height: 150px; overflow-y: auto; background: #f0f0f0; margin-top: 5px; padding: 4px; font-size: 12px; }
    #factionPanel {
      max-width: 95vw;
      overflow-x: auto;
      white-space: nowrap;
    }
    .faction-layout {
      flex-wrap: nowrap;
    }

    /* Книга инструкции */
    #infoOverlay {
      display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
      background: rgba(0,0,0,0.7); z-index: 200;
    }
    #infoBook {
      display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 90%; max-width: 500px; max-height: 80vh; background: #fafafa;
      border-radius: 10px; box-shadow: 0 0 20px #000; z-index: 201;
      overflow-y: auto; padding: 20px; font-size: 14px; color: #222;
    }
    #infoBook h2 { text-align: center; margin-top: 0; }
    #infoBook .toc { margin-bottom: 20px; }
    #infoBook .toc a { color: #4d79ff; text-decoration: none; display: block; margin: 4px 0; }
    #infoBook .section { margin-bottom: 30px; }
    #infoBook .section h3 { border-bottom: 1px solid #ccc; padding-bottom: 4px; }
    #infoBook .close-btn {
      position: absolute; top: 10px; right: 15px;
      background: none; border: none; font-size: 24px; cursor: pointer; color: #555;
    }
  </style>
</head>
<body>
  <div id="timer" style="position:absolute; top:10px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0); color:#000; padding:4px 16px; border-radius:20px; z-index:10; font-weight:bold; text-shadow: -1px -1px 0 #fff, 1px -1px 0 #fff, -1px 1px 0 #fff, 1px 1px 0 #fff;"></div>
  <div id="saveBtn" style="position:absolute; top:10px; right:10px; z-index:10; display:none;">
    <button id="saveMapBtn" style="background:#4CAF50; color:white; border:none; border-radius:4px; padding:8px 12px; cursor:pointer;">💾 Сохранить карту</button>
  </div>
  <div id="info">Загрузка...</div>
  <div id="legend">
    <div id="legendColor"></div>
    <span id="legendHashtag"></span>
  </div>
  <button id="menuBtn" title="Меню">⚙️</button>
  <div id="leaderboard"></div>

  <!-- Чат -->
  <div id="chatPanel" style="display:none; position:absolute; bottom:80px; left:20px; width:260px; max-height:320px; background:rgba(0,0,0,0.75); color:white; border-radius:8px; padding:8px; z-index:15; font-family:'Courier New',monospace;">
    <div id="chatMessages" style="height:200px; overflow-y:auto; font-size:12px; margin-bottom:5px;"></div>
    <input type="text" id="chatInput" placeholder="Сообщение..." style="width:100%; box-sizing:border-box; padding:4px; font-size:12px; background:#333; color:white; border:1px solid #555; border-radius:4px;">
    <button id="chatSendBtn" style="width:100%; margin-top:4px; background:#4d79ff; color:white; border:none; border-radius:4px; padding:4px; cursor:pointer; font-size:12px;">Отправить</button>
  </div>
  <button id="chatToggleBtn" style="position:absolute; bottom:80px; left:20px; z-index:15; background:rgba(255,255,255,0.9); border:1px solid #ccc; padding:4px 10px; border-radius:4px; cursor:pointer; font-family:'Courier New',monospace;">
  💬
  <span id="chatUnreadDot" style="display:none; position:absolute; top:-4px; right:-4px; width:12px; height:12px; background:red; border-radius:50%; border:1px solid white;"></span>
</button>

  <!-- Фракция -->
  <div id="factionPanel" style="display:none; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); background:white; border:1px solid #ccc; padding:20px; z-index:25; text-align:center; max-height:80vh; overflow-y:auto;">
    <h3 id="factionTitle"></h3>
    <div id="factionContent"></div>
  </div>
  <button id="factionBtn" style="position:absolute; bottom:80px; right:20px; z-index:15; background:rgba(255,255,255,0.9); border:1px solid #ccc; padding:4px 10px; border-radius:4px; cursor:pointer; font-family:'Courier New',monospace;">
  👥
  <span id="factionUnreadDot" style="display:none; position:absolute; top:-4px; right:-4px; width:12px; height:12px; background:red; border-radius:50%; border:1px solid white;"></span>
</button>

  <div id="menuPanel">
  <p id="menuStatus"></p>
  <button id="releaseBtn">Освободить хештег</button>
  <button id="chooseHashtagBtn" style="display:none;">Выбрать хештег</button>
  <button id="closeMenuBtn">Закрыть</button>
</div>
 <div id="overlay" style="display:none; position:fixed; top:0; left:0; width:100vw; height:100vh; background:rgba(0,0,0,0.3); z-index:19;"></div> 
  <div id="selection">
    <h3>Выберите хештег</h3>
    <div id="hashtagList"></div>
    <div id="nicknameBlock" style="margin-bottom:10px;">
      <label style="font-size:14px;">Ваш ник: 
        <input type="text" id="nicknameInput" placeholder="Введите ник" maxlength="16" style="width:120px;">
      </label>
      <button id="setNicknameBtn" style="margin-left:5px;">Сохранить</button>
      <span id="nicknameDisplay" style="display:none; margin-left:5px; font-weight:bold;"></span>
    </div>
    <p style="font-size:12px; margin:10px 0; color:#555; line-height:1.4;">
      1. Выбери хештег — заспаунишься.<br>
      2. Ресурс — лайки.<br>
      3. Кликай по клеткам рядом.
    </p>
    <hr>
    <button id="spectateBtn">👀 Наблюдать</button>
    <button id="infoBtn">📖 Информация об игре</button>
  </div>

  <div id="attackPanel">
    <div>Цель: <span id="targetCoords"></span></div>
    <div>Сила атаки: <span id="powerValue">1</span></div>
    <div id="attackControls">
      <button id="powerMinus">-</button>
      <input type="range" id="powerSlider" min="1" max="1" value="1">
      <button id="powerPlus">+</button>
    </div>
    <br>
    <button id="attackBtn">Атаковать</button>
    <button id="cancelAttackBtn">Отмена</button>
  </div>

  <div id="gameover">
    <div>💔 Вы потеряли все клетки!</div>
    <button id="gameoverSpectate">Наблюдать</button>
  </div>
  <div id="gameEndScreen">
    <div>🏆 Игра завершена!</div>
    <div id="winnerDisplay" style="margin:10px;"></div>
    <div id="finalLeaderboard" class="leaderboard"></div>
    <button id="saveFinalMapBtn" style="margin-top:20px;">💾 Сохранить карту</button>
  </div>
  <div id="alertToast"></div>

  <div id="canvasContainer">
    <canvas id="gameCanvas"></canvas>
  </div>

  <div id="loadingScreen" style="display:none; position:fixed; top:0; left:0; width:100vw; height:100vh; background:rgba(0,0,0,0.8); z-index:100; justify-content:center; align-items:center; flex-direction:column;">
    <div style="color:white; font-size:24px; margin-bottom:20px;">Загрузка мира...</div>
    <div style="width:300px; height:20px; background:#333; border-radius:10px; overflow:hidden;">
      <div id="loadingBar" style="width:0%; height:100%; background:#4CAF50; border-radius:10px;"></div>
    </div>
  </div>

  <!-- Книга инструкции -->
  <div id="infoOverlay"></div>
  <div id="infoBook">
    <button class="close-btn" id="closeInfoBook">✖</button>
    <h2>Инструкция</h2>
    <div class="toc" id="toc"></div>
    <div id="infoContent"></div>
  </div>

  <script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>
  <script>
    window.addEventListener('error', function (event) {
      updateInfo('Ошибка в строке ' + event.lineno + ': ' + event.message);
      console.error(event.error);
    });

    // ---------- НАСТРОЙКИ ----------
    const CELL_SIZE = 8;
    let MAP_W = 320;
    let MAP_H = 180;
    const SERVER_URL = 'https://019e6978-448a-7470-83ce-2265f4c421c5.tunnel4.com';

    const canvas = document.getElementById('gameCanvas');
    const AVAILABLE_HASHTAGS = [
      'Azur_lane', 'Girls_Frontline', 'Arknights', 'Fate',
      'Genshin_Impact', 'Hololive', 'Blue_Archive', 'Uma_Musume',
      'Honkai_Impact', 'Princess_Connect', 'ZenlessZoneZero', 'NIKKE',
      'HonkaiStarRail', 'WutheringWaves', 'BrownDust2', 'Neverness_to_Everness'
    ];
    const ctx = canvas.getContext('2d');
    setTimeout(() => resizeCanvas(), 0);

    function resizeCanvas() {
      const container = document.getElementById('canvasContainer');
      canvas.width = container.clientWidth;
      canvas.height = container.clientHeight;
      clampCamera();
      needsRedraw = true;
    }
    window.addEventListener('resize', resizeCanvas);

    // ---------- СОСТОЯНИЕ ----------
    const currentPlayer = {
      id: null, likes: 0, color: '#cccccc', hashtag: null, nickname: null, spawnX: 0, spawnY: 0, blockedUntil: 0
    };
    let map = Array(MAP_H).fill(null).map(() => Array(MAP_W).fill().map(() => ({ ownerId: null, hashtag: '' })));
    let playersInfo = {};
    let adjacentSet = new Set();
    let leaderboard = [];
    let animating = false;
    let hashtagLikes = {};
    let territoryBoundsCache = {};
    let labelCache = { commanders: [], minors: [] };

    let offscreen = null;
    let offCtx = null;
    let myCells = [];
    let myCenterX = 0;
    let myCenterY = 0;

    let viewX = 0, viewY = 0;
    let zoom = 1;
    const MIN_ZOOM = 0.3, MAX_ZOOM = 5;
    let spectating = false;
    let nicknameSet = false;

    let gameOver = false;
    let gameEndTime = null;
    let timerInterval = null;
    let lastReadTimestamp = 0;
    let newestMessageTimestamp = 0;
    let needsRedraw = true;
    let renderLoopRunning = false;

    let currentMapVersion = 0;
    let lastMessageId = null;
    let factionChatPollInterval = null;
    let factionLastReadTimestamp = 0;

    // UI элементы
    const attackPanel = document.getElementById('attackPanel');
    const powerSlider = document.getElementById('powerSlider');
    const powerValue = document.getElementById('powerValue');
    const targetCoords = document.getElementById('targetCoords');
    const legend = document.getElementById('legend');
    const legendColor = document.getElementById('legendColor');
    const legendHashtag = document.getElementById('legendHashtag');
    const leaderboardDiv = document.getElementById('leaderboard');
    const selectionDiv = document.getElementById('selection');
    const gameoverDiv = document.getElementById('gameover');
    document.getElementById('gameoverSpectate').addEventListener('click', () => spectate());
    const chatPanel = document.getElementById('chatPanel');
    const chatMessages = document.getElementById('chatMessages');
    const chatInput = document.getElementById('chatInput');
    const chatSendBtn = document.getElementById('chatSendBtn');
    const chatToggleBtn = document.getElementById('chatToggleBtn');
    const menuBtn = document.getElementById('menuBtn');
    const menuPanel = document.getElementById('menuPanel');
    const menuStatus = document.getElementById('menuStatus');
    const releaseBtn = document.getElementById('releaseBtn');
    const chooseHashtagBtn = document.getElementById('chooseHashtagBtn');
    const saveBtnDiv = document.getElementById('saveBtn');
    const timerDiv = document.getElementById('timer');
    const factionBtn = document.getElementById('factionBtn');
    const factionPanel = document.getElementById('factionPanel');
    const factionTitle = document.getElementById('factionTitle');
    const factionContent = document.getElementById('factionContent');
    let selectedTarget = null;
    let attackInProgress = false;
    let clickTarget = null;

    canvas.addEventListener('gesturestart', e => e.preventDefault());
    canvas.addEventListener('gesturechange', e => e.preventDefault());
    canvas.addEventListener('gestureend', e => e.preventDefault());
    canvas.addEventListener('contextmenu', e => e.preventDefault());

    function startRenderLoop() {
      if (renderLoopRunning) return;
      renderLoopRunning = true;
      function loop() {
        if (needsRedraw) {
          drawMap();
          needsRedraw = false;
        }
        requestAnimationFrame(loop);
      }
      requestAnimationFrame(loop);
    }

    // --- Таймер ---
    function updateTimer() {
      if (!gameEndTime) return;
      const now = Date.now();
      const diff = gameEndTime - now;
      if (diff <= 0) {
        timerDiv.textContent = '⌛ Игра завершена';
        if (!gameOver) {
          gameOver = true;
          attackPanel.style.display = 'none';
          saveBtnDiv.style.display = 'block';
          if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
          showGameEndScreen(leaderboard);   // показываем финальный экран
        }
        return;
      }
      const days = Math.floor(diff / (1000 * 60 * 60 * 24));
      const hours = Math.floor((diff % (86400000)) / (3600000));
      const mins = Math.floor((diff % 3600000) / 60000);
      const secs = Math.floor((diff % 60000) / 1000);
      timerDiv.textContent = `⏳ ${days}д ${hours}ч ${mins}м ${secs}с`;
    }

    // --- Никнейм ---
    document.getElementById('setNicknameBtn').addEventListener('click', () => {
      const nick = document.getElementById('nicknameInput').value.trim();
      if (!nick) return updateInfo('Введите ник');
      fetch(`${SERVER_URL}/nickname`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ userId: currentPlayer.id, nickname: nick })
      })
      .then(r => r.json())
      .then(res => {
        if (res.error) return updateInfo(res.error);
        currentPlayer.nickname = nick;
        nicknameSet = true;
        document.getElementById('nicknameInput').style.display = 'none';
        document.getElementById('setNicknameBtn').style.display = 'none';
        document.getElementById('nicknameDisplay').textContent = 'Ник: ' + nick;
        document.getElementById('nicknameDisplay').style.display = 'inline';
        updateInfo(`Привет, ${nick}!`);
      })
      .catch(() => alert('Ошибка сети'));
    });

    // --- Сохранение карты ---
    document.getElementById('saveMapBtn').addEventListener('click', () => {
      const dataUrl = canvas.toDataURL('image/png');
      const link = document.createElement('a');
      link.download = 'hashtag_territory.png';
      link.href = dataUrl;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    });

    // --- Чат ---
    chatSendBtn.addEventListener('click', async () => {
      const text = chatInput.value.trim();
      if (!text) return;
      try {
        await fetch(`${SERVER_URL}/chat`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ userId: currentPlayer.id, text })
        });
        chatInput.value = '';
        fetchChatMessages();
      } catch (e) {
        console.error('Ошибка отправки:', e);
      }
    });
    chatInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') chatSendBtn.click();
    });
    chatToggleBtn.addEventListener('click', () => {
      if (chatPanel.style.display === 'none' || chatPanel.style.display === '') {
        chatPanel.style.display = 'block';
        document.getElementById('chatUnreadDot').style.display = 'none';
        lastReadTimestamp = newestMessageTimestamp;
      } else {
        chatPanel.style.display = 'none';
      }
    });

    async function fetchChatMessages() {
      try {
        const res = await fetch(`${SERVER_URL}/chat/get`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ afterId: lastMessageId })
        }).then(r => r.json());
        if (res.messages && res.messages.length > 0) {
          let maxTs = 0;
          for (const msg of res.messages) {
            if (msg.timestamp > maxTs) maxTs = msg.timestamp;
            if (msg.id === lastMessageId) continue;
            const div = document.createElement('div');
            div.textContent = `${msg.nickname}: ${msg.text}`;
            chatMessages.appendChild(div);
            lastMessageId = msg.id;
          }
          chatMessages.scrollTop = chatMessages.scrollHeight;
          newestMessageTimestamp = maxTs;
          if (chatPanel.style.display === 'block') {
            lastReadTimestamp = newestMessageTimestamp;
            document.getElementById('chatUnreadDot').style.display = 'none';
          } else if (newestMessageTimestamp > lastReadTimestamp) {
            document.getElementById('chatUnreadDot').style.display = 'block';
          }
        }
      } catch (e) {
        console.error('Ошибка чата:', e);
      }
    }

    // --- Фракционный чат ---
    async function loadFactionChat(baseHashtag) {
      const container = document.getElementById('factionChatMessages');
      if (!container) return;
      container.innerHTML = '';
      try {
        const resp = await fetch(`${SERVER_URL}/faction/chat/get`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ baseHashtag })
        }).then(r => r.json());
        if (resp.messages && resp.messages.length > 0) {
          for (const msg of resp.messages) {
            const div = document.createElement('div');
            div.textContent = `${msg.nickname}: ${msg.text}`;
            container.appendChild(div);
          }
          container.scrollTop = container.scrollHeight;
        }
      } catch (e) {
        console.error('Ошибка загрузки чата фракции:', e);
      }
    }

    async function pollFactionChat(baseHashtag) {
      if (!baseHashtag) return;
      try {
        const resp = await fetch(`${SERVER_URL}/faction/chat/get`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ baseHashtag })
        }).then(r => r.json());
        if (resp.messages && resp.messages.length > 0) {
          const latest = resp.messages[resp.messages.length - 1];
          // Не показываем уведомление на свои сообщения
          if (latest.userId !== currentPlayer.id && latest.timestamp > factionLastReadTimestamp) {
            document.getElementById('factionUnreadDot').style.display = 'block';
          }
        }
      } catch (e) {}
    }

    // --- Делегирование событий фракционного контента ---
    factionContent.addEventListener('click', async (e) => {
      const btn = e.target.closest('button');
      if (!btn) return;
      const action = btn.dataset.action;
      if (action === 'claim') {
        const tag = btn.dataset.tag;
        const base = btn.dataset.base;
        if (!tag || !base) return;
        try {
          const resp = await fetch(`${SERVER_URL}/faction/claim`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ userId: currentPlayer.id, baseHashtag: base, minorTag: tag })
          }).then(r => r.json());
          if (resp.success) {
            currentPlayer.hashtag = resp.minorTag;
            currentPlayer.likes = resp.player.likes;
            currentPlayer.faction = base;
            applyServerResponse(resp, null);
            factionPanel.style.display = 'none';
            startGame();
          } else {
            updateInfo(resp.error);
          }
        } catch (err) {
          updateInfo('Ошибка сети');
        }
      } else if (action === 'donate') {
        const target = document.getElementById('donateTarget')?.value;
        const amount = parseInt(document.getElementById('donateAmount')?.value);
        if (!target || !amount || amount < 1) return;
        try {
          const resp = await fetch(`${SERVER_URL}/faction/donate`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ userId: currentPlayer.id, targetUserId: target, amount })
          }).then(r => r.json());
          if (resp.success) {
            factionBtn.click();
            fetchState();
          } else {
            updateInfo(resp.error);
          }
        } catch (err) {
          updateInfo('Ошибка сети');
        }
      } else if (btn.id === 'factionChatSendBtn') {
        const input = document.getElementById('factionChatInput');
        const text = input.value.trim();
        if (!text) return;
        const baseHashtag = factionContent.dataset.base;
        await fetch(`${SERVER_URL}/faction/chat/send`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ userId: currentPlayer.id, baseHashtag, text })
        });
        input.value = '';
        const container = document.getElementById('factionChatMessages');
        const nickname = currentPlayer.nickname || 'Аноним';
        const div = document.createElement('div');
        div.textContent = `${nickname}: ${text}`;
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
      }
    });

    document.addEventListener('visibilitychange', () => {
      if (document.hidden) {
        if (window.chatInterval) {
          clearInterval(window.chatInterval);
          window.chatInterval = null;
        }
      } else {
        if (currentPlayer.id && (currentPlayer.hashtag || currentPlayer.faction)) {
          if (window.chatInterval) clearInterval(window.chatInterval);
          window.chatInterval = setInterval(fetchChatMessages, 10000);
        }
      }
    });

    // --- Кнопка фракции (исправленный обработчик) ---
    factionBtn.addEventListener('click', async () => {
      const res = await fetch(`${SERVER_URL}/faction/info`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ userId: currentPlayer.id })
      }).then(r => r.json());
      if (!res.faction) {
        factionTitle.textContent = 'Вы не состоите во фракции';
        factionContent.innerHTML = '';
        factionPanel.style.display = 'block';
        return;
      }
      const f = res.faction;
      factionTitle.textContent = `Фракция #${res.baseHashtag}`;
      const myMinor = f.minors.find(m => m.occupiedBy === currentPlayer.id);
      const hasMinor = !!myMinor;
      const isCommander = currentPlayer.hashtag && AVAILABLE_HASHTAGS.includes(currentPlayer.hashtag) && currentPlayer.hashtag === res.baseHashtag;

      let leftHtml = '';
      if (f.commander) leftHtml += `<p>Командир: ${f.commander.nickname}</p>`;
      leftHtml += '<h4>Подчинённые:</h4>';
      f.minors.filter(m => m.occupiedBy).forEach(m => {
        leftHtml += `<p>${m.nickname} (${m.tag}) – ${m.likes} лайков</p>`;
      });
      leftHtml += '<h4>Свободные малые хештеги:</h4>';
      f.minors.filter(m => !m.occupiedBy).forEach(m => {
        leftHtml += `<p>#${m.tag} – ${m.likes} лайков <button data-action="claim" data-tag="${m.tag}" data-base="${res.baseHashtag}">Занять</button></p>`;
      });

      let rightHtml = '<h4>Передать лайки</h4>';
      rightHtml += '<p><select id="donateTarget">';
      if (f.commander && f.commander.userId !== currentPlayer.id) {
        rightHtml += `<option value="${f.commander.userId}">Командир ${f.commander.nickname}</option>`;
      }
      f.minors.filter(m => m.occupiedBy && m.occupiedBy !== currentPlayer.id).forEach(m => {
        rightHtml += `<option value="${m.occupiedBy}">${m.nickname} (${m.tag})</option>`;
      });
      rightHtml += '</select>';
      rightHtml += '<input type="number" id="donateAmount" min="1" placeholder="Сколько">';
      rightHtml += '<button data-action="donate">Передать</button></p>';
      rightHtml += '<h4>Чат фракции</h4>';
      rightHtml += `<div id="factionChatMessages"></div>`;
      rightHtml += `<input type="text" id="factionChatInput" placeholder="Сообщение..." style="width:80%; padding:4px; margin-top:4px;">`;
      rightHtml += `<button id="factionChatSendBtn" style="padding:4px 10px;">Отправить</button>`;

      const html = `<div class="faction-layout"><div class="faction-left">${leftHtml}</div><div class="faction-right">${rightHtml}</div></div>`;
      factionContent.dataset.base = res.baseHashtag;
      factionContent.innerHTML = html;
      factionPanel.style.display = 'block';

      // Кнопка возврата / закрытия
      let closeBtnHtml;
      if (isCommander) {
        closeBtnHtml = `<button id="closeFactionBtn" style="margin-top:10px;">Закрыть</button>`;
      } else if (hasMinor) {
        closeBtnHtml = `<button id="closeFactionBtn" style="margin-top:10px;">Закрыть</button>`;
      } else {
        closeBtnHtml = `<button id="closeFactionBtn" style="margin-top:10px;">← Вернуться к выбору основного хештега</button>`;
      }
      factionContent.insertAdjacentHTML('beforeend', closeBtnHtml);

      document.getElementById('closeFactionBtn').addEventListener('click', () => {
        if (!isCommander && !hasMinor) {
          fetch(`${SERVER_URL}/faction/leave`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ userId: currentPlayer.id })
          });
          currentPlayer.faction = null;
          factionPanel.style.display = 'none';
          const taken = Object.values(playersInfo).map(p => p.hashtag).filter(Boolean);
          showSelection(AVAILABLE_HASHTAGS, taken);
        } else {
          factionPanel.style.display = 'none';
          if (factionChatPollInterval) {
            clearInterval(factionChatPollInterval);
            factionChatPollInterval = null;
          }
        }
      });

      // Загружаем историю чата фракции
      loadFactionChat(res.baseHashtag);
      factionLastReadTimestamp = Date.now();
      document.getElementById('factionUnreadDot').style.display = 'none';
      if (factionChatPollInterval) clearInterval(factionChatPollInterval);
      factionChatPollInterval = setInterval(() => pollFactionChat(res.baseHashtag), 5000);

      // Кнопка освобождения малого хештега (только если есть занятый малый тег)
      if (hasMinor) {
        const releaseBtnHtml = '<button id="releaseMinorBtn">Освободить хештег</button>';
        factionContent.insertAdjacentHTML('beforeend', releaseBtnHtml);
        document.getElementById('releaseMinorBtn').addEventListener('click', async () => {
          const resp = await fetch(`${SERVER_URL}/faction/release`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ userId: currentPlayer.id })
          }).then(r => r.json());
          if (resp.success) {
            currentPlayer.faction = null;
            currentPlayer.hashtag = null;
            currentPlayer.likes = 0;
            factionPanel.style.display = 'none';
            const taken = Object.values(playersInfo).map(p => p.hashtag).filter(Boolean);
            showSelection(AVAILABLE_HASHTAGS, taken);
          } else {
            updateInfo(resp.error);
          }
        });
      }
    });

    // ---------- ГРАНИЦЫ КАМЕРЫ ----------
    function clampCamera() {
      const worldW = MAP_W * CELL_SIZE;
      const worldH = MAP_H * CELL_SIZE;
      const visibleW = canvas.width / zoom;
      const visibleH = canvas.height / zoom;
      const padX = visibleW * 0.5;
      const padY = visibleH * 0.5;
      viewX = Math.max(-padX, Math.min(viewX, worldW - visibleW + padX));
      viewY = Math.max(-padY, Math.min(viewY, worldH - visibleH + padY));
    }

    function isValidMap(m) {
      return Array.isArray(m) && m.length === MAP_H && m[0]?.length === MAP_W;
    }

    function updateAdjacentSet() {
      adjacentSet.clear();
      if (!currentPlayer.id || !currentPlayer.hashtag) return;
      const dirs = [[0, -1], [0, 1], [-1, 0], [1, 0]];
      for (const {x, y} of myCells) {
        for (const [dx, dy] of dirs) {
          const nx = x + dx, ny = y + dy;
          if (nx < 0 || nx >= MAP_W || ny < 0 || ny >= MAP_H) continue;
          const cell = map[ny][nx];
          if (cell.ownerId === currentPlayer.id) continue;
          if (cell.ownerId && playersInfo[cell.ownerId]?.faction === currentPlayer.faction) continue;
          adjacentSet.add(`${nx},${ny}`);
        }
      }
    }

    function rebuildTerritoryCache() {
      territoryBoundsCache = {};
      const safeH = Math.min(MAP_H, map.length);
      const safeW = Math.min(MAP_W, map[0]?.length || 0);
      const ownerMap = new Map();
      for (let y = 0; y < safeH; y++) {
        for (let x = 0; x < safeW; x++) {
          const owner = map[y][x].ownerId;
          if (!owner) continue;
          let b = ownerMap.get(owner);
          if (!b) {
            b = { minX: x, minY: y, maxX: x, maxY: y, count: 0 };
            ownerMap.set(owner, b);
          } else {
            if (x < b.minX) b.minX = x;
            if (y < b.minY) b.minY = y;
            if (x > b.maxX) b.maxX = x;
            if (y > b.maxY) b.maxY = y;
          }
          b.count++;
        }
      }
      territoryBoundsCache = {};
      for (const [owner, b] of ownerMap.entries()) {
        territoryBoundsCache[owner] = { minX: b.minX, minY: b.minY, maxX: b.maxX, maxY: b.maxY, count: b.count };
      }
      myCells = [];
      const isCommander = currentPlayer.hashtag && AVAILABLE_HASHTAGS.includes(currentPlayer.hashtag);
      for (let y = 0; y < safeH; y++) {
        for (let x = 0; x < safeW; x++) {
          const owner = map[y][x].ownerId;
          if (!owner) continue;
          if (owner === currentPlayer.id) myCells.push({x, y});
          else if (isCommander && playersInfo[owner]?.faction === currentPlayer.faction) myCells.push({x, y});
        }
      }
      if (myCells.length > 0) {
        let sumX = 0, sumY = 0;
        for (const cell of myCells) {
          sumX += cell.x * CELL_SIZE + CELL_SIZE / 2;
          sumY += cell.y * CELL_SIZE + CELL_SIZE / 2;
        }
        myCenterX = sumX / myCells.length;
        myCenterY = sumY / myCells.length;
      } else {
        myCenterX = 0; myCenterY = 0;
      }
      const factionBounds = {};
      const minorBounds = [];
      for (const [owner, bounds] of ownerMap.entries()) {
        const info = playersInfo[owner];
        if (!info || !info.hashtag) continue;
        if (AVAILABLE_HASHTAGS.includes(info.hashtag)) {
          const base = info.hashtag;
          if (!factionBounds[base]) {
            factionBounds[base] = { minX: bounds.minX, minY: bounds.minY, maxX: bounds.maxX, maxY: bounds.maxY, count: 0, hashtag: base };
          }
          const fb = factionBounds[base];
          if (bounds.minX < fb.minX) fb.minX = bounds.minX;
          if (bounds.minY < fb.minY) fb.minY = bounds.minY;
          if (bounds.maxX > fb.maxX) fb.maxX = bounds.maxX;
          if (bounds.maxY > fb.maxY) fb.maxY = bounds.maxY;
          fb.count += bounds.count;
        } else {
          minorBounds.push({ ...bounds, hashtag: info.hashtag, owner });
        }
      }
      labelCache = { commanders: Object.values(factionBounds), minors: minorBounds };
    }

    function rebuildOffscreen() {
      if (!map || map.length !== MAP_H || !map[0] || map[0].length !== MAP_W) return;
      if (!offscreen || offscreen.width !== MAP_W * CELL_SIZE || offscreen.height !== MAP_H * CELL_SIZE) {
        offscreen = document.createElement('canvas');
        offscreen.width = MAP_W * CELL_SIZE;
        offscreen.height = MAP_H * CELL_SIZE;
        offCtx = offscreen.getContext('2d');
      }
      offCtx.fillStyle = '#ffffff';
      offCtx.fillRect(0, 0, MAP_W * CELL_SIZE, MAP_H * CELL_SIZE);
      for (let y = 0; y < MAP_H; y++) {
        for (let x = 0; x < MAP_W; x++) {
          const cell = map[y][x];
          if (cell.ownerId) {
            const info = playersInfo[cell.ownerId];
            offCtx.fillStyle = info ? info.color : '#cccccc';
            offCtx.fillRect(x * CELL_SIZE, y * CELL_SIZE, CELL_SIZE, CELL_SIZE);
          } else if (cell.hashtag) {
            offCtx.fillStyle = '#b0b0b0';
            offCtx.fillRect(x * CELL_SIZE, y * CELL_SIZE, CELL_SIZE, CELL_SIZE);
          }
        }
      }
    }

    function updateOffscreenForChanges(changes) {
      if (!offCtx || !changes || !changes.length) return;
      for (const ch of changes) {
        const { x, y, ownerId, hashtag } = ch;
        if (x < 0 || x >= MAP_W || y < 0 || y >= MAP_H) continue;
        if (ownerId) {
          const info = playersInfo[ownerId];
          offCtx.fillStyle = info ? info.color : '#cccccc';
          offCtx.fillRect(x * CELL_SIZE, y * CELL_SIZE, CELL_SIZE, CELL_SIZE);
        } else if (hashtag) {
          offCtx.fillStyle = '#b0b0b0';
          offCtx.fillRect(x * CELL_SIZE, y * CELL_SIZE, CELL_SIZE, CELL_SIZE);
        } else {
          offCtx.fillStyle = '#ffffff';
          offCtx.fillRect(x * CELL_SIZE, y * CELL_SIZE, CELL_SIZE, CELL_SIZE);
        }
      }
    }

    function findClosestOwnCell(worldX, worldY) {
      if (!currentPlayer.id || !currentPlayer.hashtag) return null;
      const bounds = territoryBoundsCache[currentPlayer.id];
      let minY = 0, maxY = MAP_H - 1, minX = 0, maxX = MAP_W - 1;
      if (bounds) {
        minY = Math.max(0, bounds.minY - 1);
        maxY = Math.min(MAP_H - 1, bounds.maxY + 1);
        minX = Math.max(0, bounds.minX - 1);
        maxX = Math.min(MAP_W - 1, bounds.maxX + 1);
      }
      let bestCell = null, bestDist = Infinity;
      for (let y = minY; y <= maxY; y++) {
        for (let x = minX; x <= maxX; x++) {
          if (map[y][x].ownerId === currentPlayer.id) {
            const cx = x * CELL_SIZE + CELL_SIZE/2;
            const cy = y * CELL_SIZE + CELL_SIZE/2;
            const d = Math.hypot(cx - worldX, cy - worldY);
            if (d < bestDist) {
              bestDist = d;
              bestCell = { x, y, worldX: cx, worldY: cy };
            }
          }
        }
      }
      return bestCell;
    }

    function screenToWorld(sx, sy) {
      const rect = canvas.getBoundingClientRect();
      if (rect.width === 0 || rect.height === 0) return { x: -1, y: -1 };
      const scaleX = canvas.width / rect.width;
      const scaleY = canvas.height / rect.height;
      const canvasX = (sx - rect.left) * scaleX;
      const canvasY = (sy - rect.top) * scaleY;
      const worldX = canvasX / zoom + viewX;
      const worldY = canvasY / zoom + viewY;
      return { x: Math.floor(worldX / CELL_SIZE), y: Math.floor(worldY / CELL_SIZE) };
    }

    // ---------- УПРАВЛЕНИЕ КАМЕРОЙ ----------
    const DRAG_THRESHOLD = 4;
    let isDragging = false, hasMoved = false;
    let dragStartX, dragStartY, dragStartViewX, dragStartViewY;

    canvas.addEventListener('mousedown', e => {
      if (e.button !== 0) return;
      isDragging = true; hasMoved = false;
      dragStartX = e.clientX; dragStartY = e.clientY;
      dragStartViewX = viewX; dragStartViewY = viewY;
      canvas.style.cursor = 'grabbing';
      const {x, y} = screenToWorld(e.clientX, e.clientY);
      clickTarget = (x >= 0 && x < MAP_W && y >= 0 && y < MAP_H) ? { x, y } : null;
      e.preventDefault();
    });

    window.addEventListener('mousemove', e => {
      if (!isDragging) return;
      const dx = e.clientX - dragStartX;
      const dy = e.clientY - dragStartY;
      if (!hasMoved && Math.abs(dx) < DRAG_THRESHOLD && Math.abs(dy) < DRAG_THRESHOLD) return;
      hasMoved = true;
      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width / (rect.width || 1);
      const scaleY = canvas.height / (rect.height || 1);
      viewX = dragStartViewX - (dx * scaleX) / zoom;
      viewY = dragStartViewY - (dy * scaleY) / zoom;
      clampCamera();
      needsRedraw = true;
    });

    window.addEventListener('mouseup', () => { isDragging = false; canvas.style.cursor = 'default'; });

    canvas.addEventListener('wheel', e => {
      e.preventDefault();
      const rect = canvas.getBoundingClientRect();
      if (rect.width === 0 || rect.height === 0) return;
      const scaleX = canvas.width / rect.width;
      const scaleY = canvas.height / rect.height;
      const mx = (e.clientX - rect.left) * scaleX;
      const my = (e.clientY - rect.top) * scaleY;
      const worldX = mx / zoom + viewX;
      const worldY = my / zoom + viewY;
      const newZoom = Math.min(MAX_ZOOM, Math.max(MIN_ZOOM, zoom * (e.deltaY > 0 ? 0.9 : 1.1)));
      if (newZoom !== zoom) {
        viewX = worldX - mx / newZoom;
        viewY = worldY - my / newZoom;
        zoom = newZoom;
        clampCamera();
        needsRedraw = true;
      }
    });

    // Тач-управление
    let lastTouches = null;
    canvas.addEventListener('touchstart', e => {
      e.preventDefault();
      const t = e.touches;
      if (t.length === 1) {
        isDragging = true; hasMoved = false;
        dragStartX = t[0].clientX; dragStartY = t[0].clientY;
        dragStartViewX = viewX; dragStartViewY = viewY;
        const {x, y} = screenToWorld(t[0].clientX, t[0].clientY);
        clickTarget = (x >= 0 && x < MAP_W && y >= 0 && y < MAP_H) ? { x, y } : null;
      } else if (t.length === 2) {
        isDragging = false;
        lastTouches = {
          dist: Math.hypot(t[0].clientX - t[1].clientX, t[0].clientY - t[1].clientY),
          cx: (t[0].clientX + t[1].clientX) / 2,
          cy: (t[0].clientY + t[1].clientY) / 2,
          viewX, viewY, zoom
        };
      }
    });

    canvas.addEventListener('touchmove', e => {
      e.preventDefault();
      const t = e.touches;
      if (t.length === 1 && isDragging) {
        const dx = t[0].clientX - dragStartX;
        const dy = t[0].clientY - dragStartY;
        if (!hasMoved && Math.abs(dx) < DRAG_THRESHOLD && Math.abs(dy) < DRAG_THRESHOLD) return;
        hasMoved = true;
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / (rect.width || 1);
        const scaleY = canvas.height / (rect.height || 1);
        viewX = dragStartViewX - (dx * scaleX) / zoom;
        viewY = dragStartViewY - (dy * scaleY) / zoom;
        clampCamera();
        needsRedraw = true;
      } else if (t.length === 2 && lastTouches) {
        const newDist = Math.hypot(t[0].clientX - t[1].clientX, t[0].clientY - t[1].clientY);
        const scale = newDist / lastTouches.dist;
        const newZoom = Math.min(MAX_ZOOM, Math.max(MIN_ZOOM, lastTouches.zoom * scale));
        const rect = canvas.getBoundingClientRect();
        const sx = canvas.width / (rect.width || 1);
        const sy = canvas.height / (rect.height || 1);
        const cx = (lastTouches.cx - rect.left) * sx;
        const cy = (lastTouches.cy - rect.top) * sy;
        const worldX = cx / lastTouches.zoom + lastTouches.viewX;
        const worldY = cy / lastTouches.zoom + lastTouches.viewY;
        zoom = newZoom;
        viewX = worldX - cx / newZoom;
        viewY = worldY - cy / newZoom;
        lastTouches = { dist: newDist, cx: lastTouches.cx, cy: lastTouches.cy, viewX, viewY, zoom };
        clampCamera();
        needsRedraw = true;
      }
    });

    canvas.addEventListener('touchend', e => {
      if (e.touches.length === 0) {
        isDragging = false;
        lastTouches = null;
        if (!hasMoved && clickTarget && !animating && !spectating && currentPlayer.hashtag) {
          const {x, y} = clickTarget;
          if (adjacentSet.has(`${x},${y}`)) {
            showAttackPanel(x, y);
          } else if (map[y] && map[y][x] && map[y][x].ownerId !== currentPlayer.id) {
            showAlert('Атакуй только соседние клетки');
          }
        }
      }
    });

    // ---------- КЛИК ----------
    canvas.addEventListener('click', e => {
      if (hasMoved || animating || spectating) return;
      if (!currentPlayer.hashtag) return;
      if (!clickTarget) return;
      const {x, y} = clickTarget;
      if (x < 0 || x >= MAP_W || y < 0 || y >= MAP_H) return;
      if (!adjacentSet.has(`${x},${y}`)) {
        showAlert('Атакуй только соседние клетки');
        return;
      }
      showAttackPanel(x, y);
      clickTarget = null;
    });

    canvas.addEventListener('dblclick', e => {
      if (!currentPlayer.id || !currentPlayer.hashtag) return;
      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width / (rect.width || 1);
      const scaleY = canvas.height / (rect.height || 1);
      const mx = (e.clientX - rect.left) * scaleX;
      const my = (e.clientY - rect.top) * scaleY;
      const worldX = mx / zoom + viewX;
      const worldY = my / zoom + viewY;
      const closest = findClosestOwnCell(worldX, worldY);
      if (closest) {
        viewX = closest.worldX - canvas.width / (2 * zoom);
        viewY = closest.worldY - canvas.height / (2 * zoom);
        clampCamera();
        needsRedraw = true;
      }
    });

    // ---------- ПАНЕЛЬ АТАКИ ----------
    function showAttackPanel(x, y) {
      selectedTarget = { x, y };
      targetCoords.textContent = `${x},${y}`;
      powerSlider.max = currentPlayer.likes;
      powerSlider.value = 1;
      powerValue.textContent = '1';
      attackPanel.style.display = 'block';
    }
    function hideAttackPanel() { attackPanel.style.display = 'none'; selectedTarget = null; }
    powerSlider.addEventListener('input', () => { powerValue.textContent = powerSlider.value; });
    document.getElementById('powerPlus').addEventListener('click', () => {
      if (parseInt(powerSlider.value) < currentPlayer.likes) {
        powerSlider.value = parseInt(powerSlider.value) + 1;
        powerValue.textContent = powerSlider.value;
      }
    });
    document.getElementById('powerMinus').addEventListener('click', () => {
      if (parseInt(powerSlider.value) > 1) {
        powerSlider.value = parseInt(powerSlider.value) - 1;
        powerValue.textContent = powerSlider.value;
      }
    });
    document.getElementById('attackBtn').addEventListener('click', () => {
      if (!selectedTarget || animating) return;
      attackCell(selectedTarget.x, selectedTarget.y, Number(powerSlider.value));
      hideAttackPanel();
    });
    document.getElementById('cancelAttackBtn').addEventListener('click', hideAttackPanel);

    // ---------- МЕНЮ ----------
    menuBtn.addEventListener('click', () => {
      if (currentPlayer.hashtag) {
        menuStatus.textContent = 'Вы играете за: ' + currentPlayer.hashtag;
        if (!AVAILABLE_HASHTAGS.includes(currentPlayer.hashtag)) {
          releaseBtn.style.display = 'none';
        } else {
          releaseBtn.style.display = 'inline-block';
        }
        chooseHashtagBtn.style.display = 'none';
      } else {
        menuStatus.textContent = 'Режим наблюдателя';
        releaseBtn.style.display = 'none';
        chooseHashtagBtn.style.display = 'inline-block';
      }
      menuPanel.style.display = 'block';
    });
    document.getElementById('closeMenuBtn').addEventListener('click', () => { menuPanel.style.display = 'none'; });

    releaseBtn.addEventListener('click', async () => {
      if (!currentPlayer.hashtag) return;
      try {
        const res = await fetch(`${SERVER_URL}/release`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ userId: currentPlayer.id })
        }).then(r => r.json());
        if (res.success) {
          currentPlayer.faction = null;
          currentPlayer.hashtag = null;
          currentPlayer.likes = 0;
          applyServerResponse(res, null);
          setTimeout(() => fetchState(), 1000);
          menuPanel.style.display = 'none';
          updateInfo('Хештег освобождён. Ваши клетки стали нейтральными.');
        } else alert(res.error);
      } catch (e) { alert('Ошибка сети'); }
    });

    chooseHashtagBtn.addEventListener('click', async () => {
      menuPanel.style.display = 'none';
      await fetchState();
      const taken = Object.values(playersInfo).map(p => p.hashtag).filter(Boolean);
      showSelection(AVAILABLE_HASHTAGS, taken);
    });

    // ---------- СЕРВЕРНЫЕ ЗАПРОСЫ ----------
    function applyServerResponse(data, capturedCells) {
      if (data.mapVersion !== undefined) currentMapVersion = data.mapVersion;
      if (data.faction !== undefined) currentPlayer.faction = data.faction;
      else if (data.player && data.player.faction !== undefined) currentPlayer.faction = data.player.faction;
      if (data.player) {
        currentPlayer.likes = data.player.likes;
        if (!currentPlayer.hashtag && data.player.hashtag) currentPlayer.hashtag = data.player.hashtag;
        if (data.player.spawnX !== undefined) { currentPlayer.spawnX = data.player.spawnX; currentPlayer.spawnY = data.player.spawnY; }
        if (data.player.hashtag !== undefined) {
          if (data.player.hashtag && AVAILABLE_HASHTAGS.includes(data.player.hashtag)) currentPlayer.faction = data.player.hashtag;
          else if (!data.player.hashtag) currentPlayer.faction = null;
        }
        if (data.player.nickname && !currentPlayer.nickname) {
          currentPlayer.nickname = data.player.nickname;
          document.getElementById('nicknameInput').style.display = 'none';
          document.getElementById('setNicknameBtn').style.display = 'none';
          document.getElementById('nicknameDisplay').textContent = 'Ник: ' + data.player.nickname;
          document.getElementById('nicknameDisplay').style.display = 'inline';
        }
        if (data.player.blockedUntil !== undefined) currentPlayer.blockedUntil = data.player.blockedUntil;
      }
      if (data.playersInfo) playersInfo = data.playersInfo;
      if (data.worldW) MAP_W = data.worldW; if (data.worldH) MAP_H = data.worldH;
      if (data.leaderboard) leaderboard = data.leaderboard;
      if (data.hashtagLikes) hashtagLikes = data.hashtagLikes;
      if (data.gameEndTime) {
        gameEndTime = data.gameEndTime;
        gameOver = data.gameOver || false;
        updateTimer();
        if (!timerInterval) timerInterval = setInterval(updateTimer, 1000);
        if (gameOver) {
          attackPanel.style.display = 'none';
          saveBtnDiv.style.display = 'block';
          showGameEndScreen(data.leaderboard || leaderboard);
        }
      }
      if (currentPlayer.hashtag && data.defeatedPlayerId === currentPlayer.id) {
        currentPlayer.hashtag = null;
        currentPlayer.faction = null;
        spectating = true;
        gameoverDiv.style.display = 'flex';
        attackPanel.style.display = 'none';
        legend.style.display = 'none';
        adjacentSet.clear();
        needsRedraw = true;
      }
      if (data.changedCells && data.changedCells.length) {
        for (const ch of data.changedCells) {
          if (ch.x >= 0 && ch.x < MAP_W && ch.y >= 0 && ch.y < MAP_H) {
            map[ch.y][ch.x].ownerId = ch.ownerId;
            map[ch.y][ch.x].hashtag = ch.hashtag;
          }
        }
        updateOffscreenForChanges(data.changedCells);
        rebuildTerritoryCache();
        updateAdjacentSet();
        needsRedraw = true;
        updateInfo(`Лайков: ${currentPlayer.likes}`);
        return;
      }
      if (data.map && Array.isArray(data.map)) {
        map = data.map;
        rebuildOffscreen();
        rebuildTerritoryCache();
        updateAdjacentSet();
        needsRedraw = true;
        updateInfo(`Лайков: ${currentPlayer.likes}`);
      } else if (capturedCells?.length && data.map && Array.isArray(data.map)) {
        map = data.map;
        rebuildOffscreen();
        rebuildTerritoryCache();
        updateAdjacentSet();
        needsRedraw = true;
        updateInfo(`Лайков: ${currentPlayer.likes}`);
      } else {
        updateAdjacentSet();
        needsRedraw = true;
        updateInfo(`Лайков: ${currentPlayer.likes}`);
      }
    }

    function claimHashtag(hashtag) {
      fetch(`${SERVER_URL}/claim`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({userId:currentPlayer.id, hashtag}) })
      .then(r=>r.json()).then(res=>{
        if (res.success) {
          currentPlayer.faction = hashtag;
          currentPlayer.color = res.player.color;
          currentPlayer.spawnX = res.player.spawnX; currentPlayer.spawnY = res.player.spawnY;
          spectating = false;
          resizeCanvas();
          applyServerResponse(res, null);
          hideSelection();
          if (window.stateInterval) clearInterval(window.stateInterval);
          if (window.chatInterval) clearInterval(window.chatInterval);
          window.stateInterval = setInterval(fetchState, 10000);
          window.chatInterval = setInterval(fetchChatMessages, 10000);
          updateInfo(`Лайков: ${currentPlayer.likes}`);
          needsRedraw = true;
        } else alert(res.error);
      });
    }

    function attackCell(x, y, amount) {
      if (attackInProgress) return;
      attackInProgress = true;
      fetch(`${SERVER_URL}/attack`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ userId: currentPlayer.id, x, y, amount })
      })
      .then(r => r.json())
      .then(res => {
        attackInProgress = false;
        if (res.success) {
          updateInfo(`Захвачено ${res.capturedCells.length} клеток, потрачено ${res.spent} лайков`);
          applyServerResponse(res, res.capturedCells);
        } else {
          updateInfo(`Ошибка: ${res.error}`);
          applyServerResponse(res, null);
        }
      })
      .catch(() => { attackInProgress = false; updateInfo('⚠️ Ошибка сети при атаке'); });
    }

    function fetchState() {
      if (!currentPlayer.id) return;
      fetch(`${SERVER_URL}/sync`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ userId: currentPlayer.id, clientVersion: currentMapVersion })
      })
      .then(r => r.json())
      .then(data => {
        applyServerResponse(data, null);
        if (!data.changedCells && !data.map) needsRedraw = true;
      })
      .catch(err => console.error('Ошибка sync:', err));
    }

    function spectate() {
      fetch(`${SERVER_URL}/spectate`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({userId:currentPlayer.id}) })
      .then(() => {
        currentPlayer.hashtag = null;
        currentPlayer.faction = null;
        spectating = true;
        gameoverDiv.style.display = 'none';
        hideSelection();
        startGame();
        updateInfo('Режим наблюдателя');
        needsRedraw = true;
      });
    }

    let selectionRefreshInterval = null;
    function showSelection(hashtags, takenHashtags) {
      document.getElementById('overlay').style.display = 'block';
      document.getElementById('canvasContainer').style.pointerEvents = 'none';
      const listDiv = document.getElementById('hashtagList');
      const spectateBtn = document.getElementById('spectateBtn');
      function buildList(likesData) {
        listDiv.innerHTML = '';
        const myBlocked = currentPlayer.blockedUntil && currentPlayer.blockedUntil > Date.now();
        hashtags.forEach(tag => {
          const row = document.createElement('div');
          row.style.display = 'flex';
          row.style.alignItems = 'center';
          row.style.marginBottom = '6px';
          const btn = document.createElement('button');
          const likes = likesData[tag] || 0;
          let btnText = `#${tag} (${likes})`;
          if (takenHashtags?.includes(tag)) {
            if (currentPlayer.faction === tag) {
              btn.classList.remove('taken');
              btn.disabled = false;
              btn.textContent = `Выбрать тэг персонажа по ${tag} (${likes})`;
              btn.onclick = () => {
                if (!currentPlayer.nickname) { updateInfo('Сначала задайте ник'); return; }
                hideSelection();
                factionBtn.click();
              };
              row.appendChild(btn);
            } else {
              btn.classList.add('taken');
              btn.disabled = true;
              btn.title = 'Хештег занят';
              btn.textContent = btnText;
              const joinBtn = document.createElement('button');
              joinBtn.textContent = `Выбрать тэг персонажа по ${tag}`;
              joinBtn.style.marginLeft = '4px';
              joinBtn.title = 'Присоединиться к фракции';
              joinBtn.onclick = (e) => {
                e.stopPropagation();
                if (!currentPlayer.nickname) { updateInfo('Сначала задайте ник'); return; }
                fetch(`${SERVER_URL}/faction/join`, {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({ userId: currentPlayer.id, baseHashtag: tag })
                }).then(r => r.json()).then(resp => {
                  if (resp.success) {
                    hideSelection();
                    factionBtn.click();
                  } else updateInfo(resp.error);
                });
              };
              row.appendChild(btn);
              row.appendChild(joinBtn);
            }
          } else {
            btn.textContent = btnText;
            btn.onclick = () => {
              if (!currentPlayer.nickname) { updateInfo('Сначала задайте ник'); return; }
              if (currentPlayer.blockedUntil && currentPlayer.blockedUntil > Date.now()) {
                const left = Math.ceil((currentPlayer.blockedUntil - Date.now()) / 60000);
                updateInfo(`Вы заблокированы ещё ${left} мин.`);
                return;
              }
              claimHashtag(tag);
            };
            const owner = Object.values(playersInfo).find(p => p.hashtag === tag);
            if (owner && owner.blockedUntil && owner.blockedUntil > Date.now()) {
              const mins = Math.ceil((owner.blockedUntil - Date.now()) / 60000);
              btn.textContent = `#${tag} (осв. ${mins}м)`;
            }
            row.appendChild(btn);
          }
          listDiv.appendChild(row);
        });
      }
      buildList(hashtagLikes);
      if (selectionRefreshInterval) clearInterval(selectionRefreshInterval);
      selectionRefreshInterval = setInterval(async () => {
        try {
          const res = await fetch(`${SERVER_URL}/state`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ userId: currentPlayer.id })
          }).then(r => r.json());
          if (res.hashtagLikes) {
            hashtagLikes = res.hashtagLikes;
            if (res.player) currentPlayer.blockedUntil = res.player.blockedUntil || 0;
            buildList(hashtagLikes);
          }
        } catch (e) {}
      }, 5000);
      spectateBtn.onclick = spectate;
      selectionDiv.style.display = 'block';
    }

    function hideSelection() {
      document.getElementById('overlay').style.display = 'none';
      document.getElementById('canvasContainer').style.pointerEvents = '';
      if (selectionRefreshInterval) { clearInterval(selectionRefreshInterval); selectionRefreshInterval = null; }
      selectionDiv.style.display = 'none';
    }

    // ---------- ОТРИСОВКА ----------
    function drawMap() {
      if (!isValidMap(map)) return;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.save();
      ctx.scale(zoom, zoom);
      ctx.translate(-viewX, -viewY);
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, MAP_W * CELL_SIZE, MAP_H * CELL_SIZE);
      const startX = Math.max(0, Math.floor(viewX / CELL_SIZE));
      const startY = Math.max(0, Math.floor(viewY / CELL_SIZE));
      const endX = Math.min(MAP_W, startX + Math.ceil(canvas.width / (CELL_SIZE * zoom)) + 2);
      const endY = Math.min(MAP_H, startY + Math.ceil(canvas.height / (CELL_SIZE * zoom)) + 2);
      if (!animating && offscreen) {
        ctx.drawImage(offscreen, 0, 0);
      } else {
        for (let y = startY; y < endY; y++) {
          for (let x = startX; x < endX; x++) {
            const cell = map[y][x];
            if (cell.ownerId) {
              const info = playersInfo[cell.ownerId];
              ctx.fillStyle = info ? info.color : '#cccccc';
              ctx.fillRect(x * CELL_SIZE, y * CELL_SIZE, CELL_SIZE, CELL_SIZE);
            } else if (cell.hashtag) {
              ctx.fillStyle = '#b0b0b0';
              ctx.fillRect(x * CELL_SIZE, y * CELL_SIZE, CELL_SIZE, CELL_SIZE);
            }
          }
        }
      }
      if (!animating && currentPlayer.id && currentPlayer.hashtag && adjacentSet.size) {
        ctx.strokeStyle = '#FFD700';
        ctx.lineWidth = 1.5 / zoom;
        adjacentSet.forEach(coord => {
          const [cx, cy] = coord.split(',').map(Number);
          ctx.strokeRect(cx * CELL_SIZE, cy * CELL_SIZE, CELL_SIZE, CELL_SIZE);
        });
      }
      if (!animating && labelCache) {
        ctx.save();
        for (const b of labelCache.commanders) {
          const centerX = (b.minX + b.maxX) / 2 * CELL_SIZE + CELL_SIZE / 2;
          const centerY = (b.minY + b.maxY) / 2 * CELL_SIZE + CELL_SIZE / 2;
          const area = (b.maxX - b.minX + 1) * (b.maxY - b.minY + 1);
          let fontSize = Math.max(12, Math.sqrt(area) * 2.2);
          ctx.font = `bold ${fontSize}px "Courier New", monospace`;
          ctx.fillStyle = 'rgba(0,0,0,0.6)';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText(`#${b.hashtag}`, centerX, centerY - fontSize * 0.2);
          ctx.font = `${fontSize * 0.6}px "Courier New", monospace`;
          ctx.fillText(`${b.count}`, centerX, centerY + fontSize * 0.6);
        }
        for (const b of labelCache.minors) {
          const centerX = (b.minX + b.maxX) / 2 * CELL_SIZE + CELL_SIZE / 2;
          const centerY = (b.minY + b.maxY) / 2 * CELL_SIZE + CELL_SIZE / 2;
          const area = (b.maxX - b.minX + 1) * (b.maxY - b.minY + 1);
          let fontSize = Math.max(10, Math.sqrt(area) * 1.8);
          ctx.font = `bold ${fontSize}px "Courier New", monospace`;
          ctx.fillStyle = 'rgba(0,0,0,0.45)';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText(`#${b.hashtag}`, centerX, centerY);
        }
        ctx.restore();
      }
      for (let y = startY; y < endY; y++) {
        for (let x = startX; x < endX; x++) {
          const cell = map[y][x];
          if (cell.ownerId) {
            const owner = playersInfo[cell.ownerId];
            if (owner && owner.hashtag && !AVAILABLE_HASHTAGS.includes(owner.hashtag)) {
              ctx.save();
              ctx.strokeStyle = 'black';
              ctx.lineWidth = 1 / zoom;
              ctx.setLineDash([3 / zoom, 2 / zoom]);
              ctx.strokeRect(x * CELL_SIZE, y * CELL_SIZE, CELL_SIZE, CELL_SIZE);
              ctx.setLineDash([]);
              ctx.beginPath();
              ctx.strokeStyle = 'rgba(0,0,0,0.3)';
              ctx.lineWidth = 0.5 / zoom;
              for (let i = 0; i < CELL_SIZE; i += 4) {
                ctx.moveTo(x * CELL_SIZE + i, y * CELL_SIZE);
                ctx.lineTo(x * CELL_SIZE, y * CELL_SIZE + i);
                ctx.moveTo(x * CELL_SIZE + i, y * CELL_SIZE + CELL_SIZE);
                ctx.lineTo(x * CELL_SIZE + CELL_SIZE, y * CELL_SIZE + i);
              }
              ctx.stroke();
              ctx.restore();
            }
          }
        }
      }
      ctx.restore();
      if (currentPlayer.id && currentPlayer.hashtag && myCells.length > 0) {
        const arrowX = canvas.width / 2;
        const arrowY = canvas.height - 60;
        const worldX = arrowX / zoom + viewX;
        const worldY = arrowY / zoom + viewY;
        const closestX = myCenterX;
        const closestY = myCenterY;
        const dx = closestX - worldX;
        const dy = closestY - worldY;
        const len = Math.sqrt(dx * dx + dy * dy);
        if (len > 1) {
          const angle = Math.atan2(dy, dx);
          ctx.save();
          ctx.translate(arrowX, arrowY);
          ctx.rotate(angle);
          ctx.fillStyle = '#FFD700';
          ctx.shadowColor = '#000';
          ctx.shadowBlur = 6;
          ctx.beginPath();
          ctx.moveTo(12, 0);
          ctx.lineTo(-8, -8);
          ctx.lineTo(-8, 8);
          ctx.closePath();
          ctx.fill();
          ctx.restore();
        }
      }
      if (currentPlayer.id) menuBtn.style.display = 'block';
      else menuBtn.style.display = 'none';
      if (currentPlayer.id && currentPlayer.nickname && (currentPlayer.hashtag || currentPlayer.faction)) {
        factionBtn.style.display = 'block';
        chatToggleBtn.style.display = 'block';
      } else {
        factionBtn.style.display = 'none';
        chatToggleBtn.style.display = 'none';
      }
      if (currentPlayer.id && currentPlayer.hashtag) {
        legend.style.display = 'flex';
        legendColor.style.backgroundColor = currentPlayer.color;
        legendHashtag.textContent = '#' + currentPlayer.hashtag;
      } else legend.style.display = 'none';
      updateLeaderboard();
    }

    function updateLeaderboard() {
      if (!leaderboard.length) { leaderboardDiv.style.display = 'none'; return; }
      leaderboardDiv.style.display = 'block';
      let html = '<strong>Топ-10</strong>';
      leaderboard.forEach(e => {
        html += `<div class="leader-item"><div class="leader-color" style="background:${e.color}"></div><span class="leader-tag">#${e.hashtag}</span><span class="leader-cells">${e.cells}</span></div>`;
      });
      leaderboardDiv.innerHTML = html;
    }

    function updateInfo(text) { document.getElementById('info').textContent = text; }
    let alertTimer = null;
    function showAlert(text) {
      const toast = document.getElementById('alertToast');
      toast.textContent = text;
      toast.style.display = 'block';
      if (alertTimer) clearTimeout(alertTimer);
      alertTimer = setTimeout(() => { toast.style.display = 'none'; }, 1000);
    }

    function animateCapture(cells, serverMap) {
      if (!Array.isArray(serverMap)) { animating = false; return; }
      map = serverMap;
      rebuildOffscreen();
      rebuildTerritoryCache();
      updateAdjacentSet();
      needsRedraw = true;
      updateInfo(`Лайков: ${currentPlayer.likes}`);
      animating = false;
    }

    function showLoadingScreen() {
      document.getElementById('loadingScreen').style.display = 'flex';
      document.getElementById('loadingBar').style.width = '0%';
      let progress = 0;
      window.loadingInterval = setInterval(() => {
        progress += Math.random() * 15;
        if (progress > 90) progress = 90;
        document.getElementById('loadingBar').style.width = progress + '%';
      }, 500);
    }

    function hideLoadingScreen() {
      clearInterval(window.loadingInterval);
      document.getElementById('loadingBar').style.width = '100%';
      setTimeout(() => { document.getElementById('loadingScreen').style.display = 'none'; }, 300);
    }

    function startGame() {
      showLoadingScreen();
      resizeCanvas();
      fetch(`${SERVER_URL}/map`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ userId: currentPlayer.id })
      })
      .then(r => r.json())
      .then(data => {
        if (data.map) map = data.map;
        if (data.worldW) MAP_W = data.worldW;
        if (data.worldH) MAP_H = data.worldH;
        if (data.mapVersion !== undefined) currentMapVersion = data.mapVersion;
        if (!offscreen || offscreen.width !== MAP_W * CELL_SIZE || offscreen.height !== MAP_H * CELL_SIZE) {
          offscreen = document.createElement('canvas');
          offscreen.width = MAP_W * CELL_SIZE;
          offscreen.height = MAP_H * CELL_SIZE;
          offCtx = offscreen.getContext('2d');
        }
        rebuildOffscreen();
        rebuildTerritoryCache();
        updateAdjacentSet();
        hideLoadingScreen();
        needsRedraw = true;
        updateInfo(`Лайков: ${currentPlayer.likes}`);
        fetchState();
        if (window.stateInterval) clearInterval(window.stateInterval);
        if (window.chatInterval) clearInterval(window.chatInterval);
        window.stateInterval = setInterval(fetchState, 10000);
        window.chatInterval = setInterval(fetchChatMessages, 10000);
        window.addEventListener('beforeunload', () => {
          clearInterval(window.stateInterval);
          clearInterval(window.chatInterval);
        });
        fetchChatMessages();
      })
      .catch(err => {
        hideLoadingScreen();
        updateInfo('⚠️ Ошибка загрузки мира: ' + err.message);
      });
    }

      { id: 'faction_window', title: 'Окно фракции', text: 'Открывается кнопкой 👥 (справа внизу). Если ты состоишь во фракции, на кнопке будет красная точка при новых сообщениях в чате. Левая колонка: список командира, подчинённых и свободных хештегов персонажей. Правая колонка: передача лайков, чат фракции. Кнопка «Вернуться к выбору основного хештега» (для тех, кто ещё не занял тег персонажа) позволяет выйти из фракции и выбрать другой хештег. Кнопка «Закрыть» — закрывает панель.' },
      { id: 'chat', title: 'Чат фракции', text: 'В правой части панели фракции есть поле ввода. Сообщения видны всем членам фракции. Хранятся последние 100 сообщений. Уведомление (красная точка на кнопке 👥) появляется только при новых сообщениях от других игроков.' },
      { id: 'block', title: 'Блокировка хештега', text: 'При полном уничтожении всех клеток игрока его хештег блокируется на 1 час. В списке выбора отображается оставшееся время. Если уничтожен командир, вся фракция блокируется на тот же срок.' },
      { id: 'controls', title: 'Управление картой', text: 'Перетаскивание пальцем/мышью – перемещение по полю. Двойной клик по пустому месту (только с мыши) – центрирование на своей территории. Колёсико мыши / пинч – масштаб. Кнопка (⚙️) – освободить текущий хештег (стать наблюдателем).' },
      { id: 'indicators', title: 'Индикация', text: 'Жёлтая рамка – клетки, доступные для атаки. Цветные подписи – названия хештегов и количество клеток. Стрелка (внизу по центру) указывает направление к твоей территории. Таймер сверху показывает время до конца игры.' },
      { id: 'tech', title: 'Технические детали', text: 'Игра работает в VK Mini Apps, требуется интернет. Сервер обновляет состояние каждые 10 секунд, атаки обрабатываются мгновенно. Все действия (захват, освобождение, передача лайков) сразу подтверждаются сервером.' }
    ];

    function buildInfoBook() {
      const tocDiv = document.getElementById('toc');
      const contentDiv = document.getElementById('infoContent');
      tocDiv.innerHTML = '';
      contentDiv.innerHTML = '';

      sections.forEach(sec => {
        const link = document.createElement('a');
        link.href = `#${sec.id}`;
        link.textContent = sec.title;
        link.addEventListener('click', (e) => {
          e.preventDefault();
          document.getElementById(sec.id).scrollIntoView({ behavior: 'smooth' });
        });
        tocDiv.appendChild(link);

        const sectionDiv = document.createElement('div');
        sectionDiv.className = 'section';
        sectionDiv.id = sec.id;
        sectionDiv.innerHTML = `<h3>${sec.title}</h3><p>${sec.text}</p>`;
        contentDiv.appendChild(sectionDiv);
      });
    }
    buildInfoBook();

    document.getElementById('infoBtn').addEventListener('click', () => {
      document.getElementById('infoOverlay').style.display = 'block';
      document.getElementById('infoBook').style.display = 'block';
    });

    document.getElementById('closeInfoBook').addEventListener('click', () => {
      document.getElementById('infoOverlay').style.display = 'none';
      document.getElementById('infoBook').style.display = 'none';
    });
    document.getElementById('infoOverlay').addEventListener('click', () => {
      document.getElementById('infoOverlay').style.display = 'none';
      document.getElementById('infoBook').style.display = 'none';
    });

    // ---------- ЭКРАН ЗАВЕРШЕНИЯ ИГРЫ ----------
    function showGameEndScreen(leaderboardData) {
      if (window.stateInterval) { clearInterval(window.stateInterval); window.stateInterval = null; }
      if (window.chatInterval) { clearInterval(window.chatInterval); window.chatInterval = null; }
      if (factionChatPollInterval) { clearInterval(factionChatPollInterval); factionChatPollInterval = null; }

      document.getElementById('gameEndScreen').style.display = 'flex';
      document.getElementById('attackPanel').style.display = 'none';
      document.getElementById('legend').style.display = 'none';
      document.getElementById('info').textContent = 'Игра завершена';

      const winner = leaderboardData[0];
      if (winner) {
        document.getElementById('winnerDisplay').textContent = `Победитель: #${winner.hashtag} (${winner.cells} клеток)`;
      }

      const listDiv = document.getElementById('finalLeaderboard');
      listDiv.innerHTML = '<strong>Итоговая таблица</strong>';
      leaderboardData.forEach(e => {
        listDiv.innerHTML += `<div class="leader-item"><div class="leader-color" style="background:${e.color}"></div><span class="leader-tag">#${e.hashtag}</span><span class="leader-cells">${e.cells}</span></div>`;
      });
    }

    document.getElementById('saveFinalMapBtn').addEventListener('click', () => {
      const dataUrl = canvas.toDataURL('image/png');
      const link = document.createElement('a');
      link.download = 'hashtag_territory_final.png';
      link.href = dataUrl;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    });

    // ---------- ИНИЦИАЛИЗАЦИЯ ----------
    startRenderLoop();
    showLoadingScreen();
    vkBridge.send('VKWebAppInit')
      .then(() => vkBridge.send('VKWebAppGetUserInfo'))
      .then(data => {
        currentPlayer.id = data.id;
        updateInfo(`Привет, ${data.first_name}! Соединяюсь с сервером...`);
        return fetch(`${SERVER_URL}/join`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ userId: data.id })
        });
      })
      .then(r => {
        if (!r.ok) throw new Error(`Ошибка сервера: ${r.status}`);
        return r.json();
      })
      .then(state => {
        if (state.gameOver) {
          hideLoadingScreen();
          showGameEndScreen(state.leaderboard || []);
          return;
        }
        if (state.player) {
          currentPlayer.likes = state.player.likes;
          currentPlayer.hashtag = state.player.hashtag || null;
          if (state.player.nickname) {
            currentPlayer.nickname = state.player.nickname;
            document.getElementById('nicknameInput').style.display = 'none';
            document.getElementById('setNicknameBtn').style.display = 'none';
            document.getElementById('nicknameDisplay').textContent = 'Ник: ' + state.player.nickname;
            document.getElementById('nicknameDisplay').style.display = 'inline';
          }
          if (state.player.spawnX !== undefined) {
            currentPlayer.spawnX = state.player.spawnX;
            currentPlayer.spawnY = state.player.spawnY;
          }
          if (state.player.blockedUntil !== undefined) {
            currentPlayer.blockedUntil = state.player.blockedUntil;
          }
        }
        if (state.playersInfo) playersInfo = state.playersInfo;
        if (state.leaderboard) leaderboard = state.leaderboard;
        if (state.hashtagLikes) hashtagLikes = state.hashtagLikes;
        if (state.worldW) MAP_W = state.worldW;
        if (state.worldH) MAP_H = state.worldH;
        if (state.gameEndTime) {
          gameEndTime = state.gameEndTime;
          gameOver = state.gameOver || false;
          updateTimer();
          if (!timerInterval) timerInterval = setInterval(updateTimer, 1000);
        }
        if (state.mapVersion !== undefined) currentMapVersion = state.mapVersion;
        currentPlayer.color = state.player?.color || '#cccccc';
        currentPlayer.faction = state.faction;

        if (currentPlayer.hashtag) {
          startGame();
        } else {
          if (currentPlayer.faction) {
            hideSelection();
            factionBtn.click();
          } else {
            const taken = Object.values(playersInfo).map(p => p.hashtag).filter(Boolean);
            showSelection(AVAILABLE_HASHTAGS, taken);
            updateInfo('Выберите хештег и ник');
          }
        }
        hideLoadingScreen();
      })
      .catch(err => {
        updateInfo('⚠️ Нет связи с сервером: ' + err.message);
        console.error(err);
        resizeCanvas();
        needsRedraw = true;
      });
  </script>
</body>
</html>
