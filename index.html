<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>Hashtag Territory</title>
  <style>
    body { margin:0; padding:0; background:#222; font-family:'Courier New',monospace; overflow:hidden; touch-action:manipulation; }
    #canvasContainer { width:100%; height:100vh; display:flex; justify-content:center; align-items:center; }
    canvas { display:block; max-width:100%; max-height:100%; touch-action:none; }
    #info { position:absolute; top:10px; left:10px; z-index:10; background:rgba(255,255,255,0.9); padding:4px 8px; border-radius:4px; }
    #legend { position:absolute; bottom:20px; left:20px; z-index:10; background:rgba(255,255,255,0.9); padding:8px 12px; border-radius:8px; display:none; align-items:center; gap:8px; }
    #legendColor { width:20px; height:20px; border:1px solid #333; }
    #menuBtn { position:absolute; bottom:20px; right:20px; z-index:10; background:rgba(255,255,255,0.9); border:1px solid #ccc; padding:8px 12px; border-radius:8px; font-size:16px; cursor:pointer; display:none; }
    #leaderboard { position:absolute; top:10px; right:10px; z-index:10; background:rgba(0,0,0,0.5); color:white; padding:8px 12px; border-radius:8px; max-width:200px; font-size:12px; display:none; }
    .leader-item { display:flex; align-items:center; margin-bottom:4px; }
    .leader-color { width:10px; height:10px; margin-right:5px; border:1px solid #fff; }
    .leader-tag { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .leader-cells { margin-left:5px; }
    #menuPanel { display:none; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); background:white; border:1px solid #ccc; padding:20px; z-index:20; text-align:center; }
    #selection { display:none; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); background:white; border:1px solid #ccc; padding:20px; z-index:20; max-height:80vh; overflow-y:auto; }
    #selection button.taken { background:#ffcccc; color:#900; cursor:not-allowed; text-decoration:line-through; }
    #attackPanel { display:none; position:absolute; bottom:20px; left:50%; transform:translateX(-50%); background:white; border:1px solid #ccc; padding:15px; z-index:20; text-align:center; }
    #gameover { display:none; position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:100; justify-content:center; align-items:center; flex-direction:column; color:white; font-size:24px; }
    button { margin:5px; padding:8px 12px; cursor:pointer; font-family:'Courier New',monospace; }
    input[type=range] { width:200px; }
  </style>
</head>
<body>
  <div id="info">Загрузка...</div>
  <div id="legend">
    <div id="legendColor"></div>
    <span id="legendHashtag"></span>
  </div>
  <button id="menuBtn" title="Меню">⚙️</button>
  <div id="leaderboard"></div>
  <div id="menuPanel">
    <p>Вы играете за: <strong><span id="menuHashtag"></span></strong></p>
    <p id="menuCanChange"></p>
    <button id="changeHashtagBtn">Сменить хештег</button>
    <button id="closeMenuBtn">Закрыть</button>
  </div>
  <div id="selection">
    <h3>Выберите хештег</h3>
    <div id="hashtagList"></div>
    <hr>
    <button id="spectateBtn">👀 Наблюдать</button>
  </div>
  <div id="attackPanel">
    <div>Цель: <span id="targetCoords"></span></div>
    <div>Захватить клеток: <span id="powerValue">1</span></div>
    <input type="range" id="powerSlider" min="1" max="1" value="1">
    <br>
    <button id="attackBtn">Атаковать</button>
    <button id="cancelAttackBtn">Отмена</button>
  </div>
  <div id="gameover">
    <div>💔 Вы потеряли все клетки!</div>
    <button id="gameoverSpectate">Наблюдать</button>
  </div>
  <div id="canvasContainer">
    <canvas id="gameCanvas"></canvas>
  </div>

  <script src="https://unpkg.com/@vkontakte/vk-bridge/dist/browser.min.js"></script>
  <script>
    // ---------- НАСТРОЙКИ ----------
    const CELL_SIZE = 8;
    let MAP_W = 320;
    let MAP_H = 180;
    const SERVER_URL = 'https://here-vacation-mistress-region.trycloudflare.com'; // замените

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    function resizeCanvas() {
      const container = document.getElementById('canvasContainer');
      canvas.width = container.clientWidth;
      canvas.height = container.clientHeight;
      drawMap();
    }
    window.addEventListener('resize', resizeCanvas);

    // ---------- СОСТОЯНИЕ ----------
    const currentPlayer = {
      id: null, likes: 0, color: '#cccccc', hashtag: null, spawnX: 0, spawnY: 0
    };
    let map = Array(MAP_H).fill(null).map(() => Array(MAP_W).fill().map(() => ({ ownerId: null, hashtag: '' })));
    let playersInfo = {};
    let adjacentSet = new Set();
    let leaderboard = [];
    let animating = false, animationQueue = [], animationTimer = null;
    let viewX = 0, viewY = 0, zoom = 1;
    const MIN_ZOOM = 0.3, MAX_ZOOM = 5;
    let spectating = false;

    // UI
    const attackPanel = document.getElementById('attackPanel');
    const powerSlider = document.getElementById('powerSlider');
    const powerValue = document.getElementById('powerValue');
    const targetCoords = document.getElementById('targetCoords');
    const legend = document.getElementById('legend');
    const legendColor = document.getElementById('legendColor');
    const legendHashtag = document.getElementById('legendHashtag');
    const leaderboardDiv = document.getElementById('leaderboard');
    const selectionDiv = document.getElementById('selection');
    const gameoverDiv = document.getElementById('gameover');
    const menuBtn = document.getElementById('menuBtn');
    const menuPanel = document.getElementById('menuPanel');
    const menuHashtag = document.getElementById('menuHashtag');
    const menuCanChange = document.getElementById('menuCanChange');
    const changeHashtagBtn = document.getElementById('changeHashtagBtn');
    let selectedTarget = null;

    document.addEventListener('gesturestart', e => e.preventDefault());
    document.addEventListener('gesturechange', e => e.preventDefault());
    document.addEventListener('gestureend', e => e.preventDefault());
    canvas.addEventListener('contextmenu', e => e.preventDefault());

    // ---------- ГРАНИЦЫ КАМЕРЫ (можно подвести край к центру) ----------
    function clampCamera() {
      const worldW = MAP_W * CELL_SIZE;
      const worldH = MAP_H * CELL_SIZE;
      const visibleW = canvas.width / zoom;
      const visibleH = canvas.height / zoom;
      viewX = Math.max(-visibleW / 2, Math.min(viewX, worldW - visibleW / 2));
      viewY = Math.max(-visibleH / 2, Math.min(viewY, worldH - visibleH / 2));
    }

    function isValidMap(m) {
      return Array.isArray(m) && m.length === MAP_H && m[0]?.length === MAP_W;
    }

    function updateAdjacentSet() {
      adjacentSet.clear();
      if (!currentPlayer.id || !currentPlayer.hashtag) return;
      for (let y=0; y<MAP_H; y++) {
        for (let x=0; x<MAP_W; x++) {
          if (map[y][x].ownerId !== currentPlayer.id) {
            for (const [dx,dy] of [[0,-1],[0,1],[-1,0],[1,0]]) {
              const nx = x+dx, ny = y+dy;
              if (nx>=0 && nx<MAP_W && ny>=0 && ny<MAP_H && map[ny][nx].ownerId === currentPlayer.id) {
                adjacentSet.add(`${x},${y}`);
                break;
              }
            }
          }
        }
      }
    }

    function getTerritoryBounds(ownerId) {
      let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity, count = 0;
      for (let y=0; y<MAP_H; y++) {
        for (let x=0; x<MAP_W; x++) {
          if (map[y][x].ownerId === ownerId) {
            if (x < minX) minX = x; if (y < minY) minY = y;
            if (x > maxX) maxX = x; if (y > maxY) maxY = y;
            count++;
          }
        }
      }
      return { minX, minY, maxX, maxY, count, width: maxX-minX+1, height: maxY-minY+1 };
    }

    // Поиск ближайшей к заданной мировой точке клетки игрока
    function findClosestOwnCell(worldX, worldY) {
      if (!currentPlayer.id || !currentPlayer.hashtag) return null;
      let bestCell = null;
      let bestDist = Infinity;
      for (let y=0; y<MAP_H; y++) {
        for (let x=0; x<MAP_W; x++) {
          if (map[y][x].ownerId === currentPlayer.id) {
            const cellCenterX = x * CELL_SIZE + CELL_SIZE/2;
            const cellCenterY = y * CELL_SIZE + CELL_SIZE/2;
            const dx = cellCenterX - worldX;
            const dy = cellCenterY - worldY;
            const dist = Math.sqrt(dx*dx + dy*dy);
            if (dist < bestDist) {
              bestDist = dist;
              bestCell = { x, y, worldX: cellCenterX, worldY: cellCenterY };
            }
          }
        }
      }
      return bestCell;
    }

    // Рисуем стрелку-указатель к ближайшей своей клетке, если центр экрана вне территории
    function drawDirectionIndicator() {
      if (!currentPlayer.hashtag || !currentPlayer.id) return;
      // Центр экрана в мировых координатах
      const screenCenterX = canvas.width / 2;
      const screenCenterY = canvas.height / 2;
      const centerWorldX = (screenCenterX + viewX) / zoom;
      const centerWorldY = (screenCenterY + viewY) / zoom;

      const closest = findClosestOwnCell(centerWorldX, centerWorldY);
      if (!closest) return;

      // Проверяем, находится ли центр экрана внутри своей территории (очень близко к своей клетке)
      const cellSize = CELL_SIZE;
      const cellCenterX = closest.worldX;
      const cellCenterY = closest.worldY;
      const distToCenter = Math.hypot(cellCenterX - centerWorldX, cellCenterY - centerWorldY);
      // Если центр экрана в пределах своей клетки или рядом — не показываем стрелку
      if (distToCenter < cellSize * 1.5) return;

      // Вектор от центра экрана к клетке
      const dx = cellCenterX - centerWorldX;
      const dy = cellCenterY - centerWorldY;
      const len = Math.sqrt(dx*dx + dy*dy);
      if (len === 0) return;
      const ndx = dx / len;
      const ndy = dy / len;

      // Находим точку на границе видимой области (canvas)
      const w = canvas.width;
      const h = canvas.height;
      let edgeX = screenCenterX + ndx * Math.min(w, h) * 0.4; // отступ от края
      let edgeY = screenCenterY + ndy * Math.min(w, h) * 0.4;

      // Убедимся, что точка на границе экрана
      const margin = 30;
      // Проецируем на границы
      const tLeft = (margin - screenCenterX) / ndx;
      const tRight = (w - margin - screenCenterX) / ndx;
      const tTop = (margin - screenCenterY) / ndy;
      const tBottom = (h - margin - screenCenterY) / ndy;

      let t = Infinity;
      if (tLeft > 0 && tLeft < t) t = tLeft;
      if (tRight > 0 && tRight < t) t = tRight;
      if (tTop > 0 && tTop < t) t = tTop;
      if (tBottom > 0 && tBottom < t) t = tBottom;

      if (t === Infinity) return;
      const ix = screenCenterX + ndx * t;
      const iy = screenCenterY + ndy * t;

      // Рисуем треугольник
      ctx.save();
      ctx.translate(ix, iy);
      const angle = Math.atan2(ndy, ndx);
      ctx.rotate(angle);
      ctx.fillStyle = '#FFD700';
      ctx.shadowColor = '#000';
      ctx.shadowBlur = 6;
      ctx.beginPath();
      ctx.moveTo(10, 0);
      ctx.lineTo(-8, -6);
      ctx.lineTo(-8, 6);
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }

    // ---------- ОТРИСОВКА ----------
    function drawMap() {
      if (!isValidMap(map)) return;
      ctx.clearRect(0,0,canvas.width,canvas.height);
      ctx.save();
      ctx.translate(-viewX, -viewY);
      ctx.scale(zoom, zoom);

      // Фон
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0,0,MAP_W*CELL_SIZE, MAP_H*CELL_SIZE);

      // Клетки
      for (let y=0; y<MAP_H; y++) {
        for (let x=0; x<MAP_W; x++) {
          const cell = map[y][x];
          if (cell.ownerId) {
            const info = playersInfo[cell.ownerId];
            ctx.fillStyle = info ? info.color : '#cccccc';
            ctx.fillRect(x*CELL_SIZE, y*CELL_SIZE, CELL_SIZE, CELL_SIZE);
          }
        }
      }

      // Сетка
      ctx.strokeStyle = '#e0e0e0';
      ctx.lineWidth = 0.3/zoom;
      for (let i=0; i<=MAP_H; i++) { ctx.beginPath(); ctx.moveTo(0,i*CELL_SIZE); ctx.lineTo(MAP_W*CELL_SIZE,i*CELL_SIZE); ctx.stroke(); }
      for (let i=0; i<=MAP_W; i++) { ctx.beginPath(); ctx.moveTo(i*CELL_SIZE,0); ctx.lineTo(i*CELL_SIZE,MAP_H*CELL_SIZE); ctx.stroke(); }

      // Подсветка соседей
      if (!animating && currentPlayer.id && currentPlayer.hashtag && adjacentSet.size) {
        ctx.strokeStyle = '#FFD700';
        ctx.lineWidth = 1.5/zoom;
        adjacentSet.forEach(coord => {
          const [cx,cy] = coord.split(',').map(Number);
          ctx.strokeRect(cx*CELL_SIZE, cy*CELL_SIZE, CELL_SIZE, CELL_SIZE);
        });
      }

      // Надписи территорий
      const drawnOwners = new Set();
      for (let y=0; y<MAP_H; y++) {
        for (let x=0; x<MAP_W; x++) {
          const owner = map[y][x].ownerId;
          if (!owner || drawnOwners.has(owner)) continue;
          drawnOwners.add(owner);
          const bounds = getTerritoryBounds(owner);
          if (bounds.count === 0) continue;
          const info = playersInfo[owner];
          if (!info) continue;
          const centerX = (bounds.minX + bounds.maxX)/2 * CELL_SIZE + CELL_SIZE/2;
          const centerY = (bounds.minY + bounds.maxY)/2 * CELL_SIZE + CELL_SIZE/2;
          const area = bounds.width * bounds.height;
          const fontSize = Math.max(10, Math.sqrt(area) * 2.2);
          ctx.fillStyle = 'rgba(0,0,0,0.5)';
          ctx.font = `bold ${fontSize}px "Courier New", monospace`;
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText(info.hashtag || '?', centerX, centerY - fontSize*0.2);
          ctx.font = `${fontSize*0.6}px "Courier New", monospace`;
          ctx.fillText(`${bounds.count}`, centerX, centerY + fontSize*0.6);
        }
      }
      ctx.textAlign = 'start';
      ctx.restore();

      // Стрелка-указатель (рисуется в экранных координатах)
      drawDirectionIndicator();

      // UI
      if (currentPlayer.id && currentPlayer.hashtag) {
        legend.style.display = 'flex';
        legendColor.style.backgroundColor = currentPlayer.color;
        legendHashtag.textContent = '#' + currentPlayer.hashtag;
        menuBtn.style.display = 'block';
      } else {
        legend.style.display = 'none';
        menuBtn.style.display = 'none';
      }
      updateLeaderboard();
    }

    function updateLeaderboard() {
      if (!leaderboard.length) { leaderboardDiv.style.display = 'none'; return; }
      leaderboardDiv.style.display = 'block';
      let html = '<strong>Топ-10</strong>';
      leaderboard.forEach(e => {
        html += `<div class="leader-item"><div class="leader-color" style="background:${e.color}"></div><span class="leader-tag">#${e.hashtag}</span><span class="leader-cells">${e.cells}</span></div>`;
      });
      leaderboardDiv.innerHTML = html;
    }

    function updateInfo(text) { document.getElementById('info').textContent = text; }

    // Анимация захвата
    function animateCapture(cells, serverMap) {
      if (!cells.length) {
        map = serverMap; updateAdjacentSet(); drawMap(); updateInfo(`Лайков: ${currentPlayer.likes}`);
        animating = false; return;
      }
      animating = true; animationQueue = [...cells]; map = serverMap;
      function step() {
        if (!animationQueue.length) { animating = false; updateAdjacentSet(); drawMap(); updateInfo(`Лайков: ${currentPlayer.likes}`); return; }
        drawMap(); animationQueue.shift();
        animationTimer = setTimeout(step, 200);
      }
      step();
    }

    // Меню
    menuBtn.addEventListener('click', async () => {
      menuHashtag.textContent = '#' + currentPlayer.hashtag;
      try {
        const res = await fetch(`${SERVER_URL}/canChange`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ userId: currentPlayer.id })
        }).then(r => r.json());
        if (res.canChange) {
          menuCanChange.textContent = 'Вы можете сменить хештег.';
          changeHashtagBtn.disabled = false;
        } else {
          menuCanChange.textContent = `Смена недоступна. Осталось примерно ${res.hoursLeft} ч.`;
          changeHashtagBtn.disabled = true;
        }
      } catch (e) {
        menuCanChange.textContent = 'Ошибка проверки.';
        changeHashtagBtn.disabled = true;
      }
      menuPanel.style.display = 'block';
    });

    document.getElementById('closeMenuBtn').addEventListener('click', () => {
      menuPanel.style.display = 'none';
    });

    changeHashtagBtn.addEventListener('click', () => {
      menuPanel.style.display = 'none';
      fetch(`${SERVER_URL}/state`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ userId: currentPlayer.id })
      }).then(r => r.json()).then(data => {
        playersInfo = data.playersInfo || {};
        const taken = Object.values(playersInfo).map(p => p.hashtag).filter(Boolean);
        showSelection(AVAILABLE_HASHTAGS, taken);
      });
    });

    // Конвертация координат
    function screenToWorld(sx, sy) {
      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width/rect.width, scaleY = canvas.height/rect.height;
      const cx = (sx - rect.left)*scaleX, cy = (sy - rect.top)*scaleY;
      return {
        x: Math.floor((cx + viewX)/zoom/CELL_SIZE),
        y: Math.floor((cy + viewY)/zoom/CELL_SIZE)
      };
    }

    // ---------- DRAG ----------
    let isDragging = false, dragStartX, dragStartY, dragStartViewX, dragStartViewY;
    canvas.addEventListener('mousedown', e => {
      if (e.button !== 0) return;
      isDragging = true;
      dragStartX = e.clientX; dragStartY = e.clientY;
      dragStartViewX = viewX; dragStartViewY = viewY;
      canvas.style.cursor = 'grabbing';
      e.preventDefault();
    });
    window.addEventListener('mousemove', e => {
      if (!isDragging) return;
      const dx = e.clientX - dragStartX;
      const dy = e.clientY - dragStartY;
      viewX = dragStartViewX - dx / zoom;
      viewY = dragStartViewY - dy / zoom;
      clampCamera();
      drawMap();
    });
    window.addEventListener('mouseup', () => {
      isDragging = false;
      canvas.style.cursor = 'default';
    });

    // Зум
    canvas.addEventListener('wheel', e => {
      e.preventDefault();
      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width/rect.width, scaleY = canvas.height/rect.height;
      const mx = (e.clientX - rect.left)*scaleX, my = (e.clientY - rect.top)*scaleY;
      const worldX = (mx + viewX)/zoom, worldY = (my + viewY)/zoom;
      const newZoom = Math.min(MAX_ZOOM, Math.max(MIN_ZOOM, zoom * (e.deltaY>0?0.9:1.1)));
      if (newZoom !== zoom) {
        viewX = worldX*newZoom - mx;
        viewY = worldY*newZoom - my;
        zoom = newZoom;
        drawMap();
      }
    });

    // Touch
    let lastTouches = null;
    canvas.addEventListener('touchstart', e => {
      e.preventDefault(); const t = e.touches;
      if (t.length===1) { isDragging=true; dragStartX=t[0].clientX; dragStartY=t[0].clientY; dragStartViewX=viewX; dragStartViewY=viewY; }
      else if (t.length===2) { isDragging=false; lastTouches={ dist:Math.hypot(t[0].clientX-t[1].clientX,t[0].clientY-t[1].clientY), cx:(t[0].clientX+t[1].clientX)/2, cy:(t[0].clientY+t[1].clientY)/2, viewX, viewY, zoom }; }
    });
    canvas.addEventListener('touchmove', e => {
      e.preventDefault(); const t = e.touches;
      if (t.length===1 && isDragging) {
        const dx = t[0].clientX - dragStartX;
        const dy = t[0].clientY - dragStartY;
        viewX = dragStartViewX - dx/zoom;
        viewY = dragStartViewY - dy/zoom;
        clampCamera();
        drawMap();
      } else if (t.length===2 && lastTouches) {
        const newDist = Math.hypot(t[0].clientX-t[1].clientX, t[0].clientY-t[1].clientY);
        const scale = newDist / lastTouches.dist;
        const newZoom = Math.min(MAX_ZOOM, Math.max(MIN_ZOOM, lastTouches.zoom * scale));
        const rect = canvas.getBoundingClientRect();
        const sx = canvas.width/rect.width, sy = canvas.height/rect.height;
        const cx = (lastTouches.cx - rect.left)*sx, cy = (lastTouches.cy - rect.top)*sy;
        const worldX = (cx + lastTouches.viewX)/lastTouches.zoom, worldY = (cy + lastTouches.viewY)/lastTouches.zoom;
        zoom = newZoom; viewX = worldX*zoom - cx; viewY = worldY*zoom - cy;
        lastTouches = { dist:newDist, cx:lastTouches.cx, cy:lastTouches.cy, viewX, viewY, zoom };
        drawMap();
      }
    });
    canvas.addEventListener('touchend', e => { if (e.touches.length===0) { isDragging=false; lastTouches=null; } });

    // Атака
    canvas.addEventListener('click', e => {
      if (isDragging || animating || spectating) return;
      if (!currentPlayer.hashtag) return;
      const {x, y} = screenToWorld(e.clientX, e.clientY);
      if (x<0||x>=MAP_W||y<0||y>=MAP_H) return;
      if (!adjacentSet.has(`${x},${y}`)) { updateInfo('Можно атаковать только подсвеченные клетки'); return; }
      showAttackPanel(x, y);
    });

    function showAttackPanel(x,y) {
      selectedTarget = {x,y}; targetCoords.textContent = `${x},${y}`;
      powerSlider.max = currentPlayer.likes; powerSlider.value = 1; powerValue.textContent = '1';
      attackPanel.style.display = 'block';
    }
    function hideAttackPanel() { attackPanel.style.display='none'; selectedTarget=null; }
    powerSlider.addEventListener('input', ()=> powerValue.textContent = powerSlider.value);
    document.getElementById('attackBtn').addEventListener('click', ()=>{
      if (!selectedTarget || animating) return;
      attackCell(selectedTarget.x, selectedTarget.y, Number(powerSlider.value));
      hideAttackPanel();
    });
    document.getElementById('cancelAttackBtn').addEventListener('click', hideAttackPanel);

    // Серверные запросы
    function applyServerResponse(data, capturedCells) {
      if (data.player) {
        currentPlayer.likes = data.player.likes;
        if (!currentPlayer.hashtag && data.player.hashtag) currentPlayer.hashtag = data.player.hashtag;
        if (data.player.spawnX !== undefined) { currentPlayer.spawnX = data.player.spawnX; currentPlayer.spawnY = data.player.spawnY; }
      }
      if (data.playersInfo) playersInfo = data.playersInfo;
      if (data.worldW) MAP_W = data.worldW; if (data.worldH) MAP_H = data.worldH;
      if (data.leaderboard) leaderboard = data.leaderboard;

      if (currentPlayer.hashtag && data.defeatedPlayerId === currentPlayer.id) {
        currentPlayer.hashtag = null;
        spectating = true;
        gameoverDiv.style.display = 'flex';
      }

      if (capturedCells?.length) animateCapture(capturedCells, data.map);
      else {
        if (isValidMap(data.map)) map = data.map;
        updateAdjacentSet();
        drawMap();
        updateInfo(`Лайков: ${currentPlayer.likes}`);
      }
    }

    function claimHashtag(hashtag) {
      fetch(`${SERVER_URL}/claim`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({userId:currentPlayer.id, hashtag}) })
      .then(r=>r.json()).then(res=>{
        if (res.success) {
          currentPlayer.color = res.player.color;
          currentPlayer.spawnX = res.player.spawnX; currentPlayer.spawnY = res.player.spawnY;
          applyServerResponse(res, null);
          hideSelection();
        } else alert(res.error);
      });
    }

    function attackCell(x,y,amount) {
      fetch(`${SERVER_URL}/attack`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({userId:currentPlayer.id, x,y,amount}) })
      .then(r=>r.json()).then(res=>{
        if (res.success) applyServerResponse(res, res.capturedCells);
        else { updateInfo(`Ошибка: ${res.error}`); applyServerResponse(res, null); }
      });
    }

    function fetchState() {
      if (!currentPlayer.id || animating) return;
      fetch(`${SERVER_URL}/state`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({userId:currentPlayer.id}) })
      .then(r=>r.json()).then(data=>applyServerResponse(data, null));
    }

    function spectate() {
      fetch(`${SERVER_URL}/spectate`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({userId:currentPlayer.id}) })
      .then(() => {
        currentPlayer.hashtag = null;
        spectating = true;
        gameoverDiv.style.display = 'none';
        hideSelection();
        updateInfo('Режим наблюдателя');
        drawMap();
      });
    }

    function showSelection(hashtags, takenHashtags) {
      const listDiv = document.getElementById('hashtagList');
      listDiv.innerHTML = '';
      hashtags.forEach(tag => {
        const btn = document.createElement('button');
        btn.textContent = '#' + tag;
        if (takenHashtags?.includes(tag)) {
          btn.classList.add('taken');
          btn.disabled = true;
          btn.title = 'Хештег занят';
        } else {
          btn.onclick = () => claimHashtag(tag);
        }
        listDiv.appendChild(btn);
      });
      document.getElementById('spectateBtn').onclick = spectate;
      selectionDiv.style.display = 'block';
    }

    function hideSelection() { selectionDiv.style.display = 'none'; }

    document.getElementById('gameoverSpectate').addEventListener('click', spectate);

    // ---------- ИНИЦИАЛИЗАЦИЯ ----------
    vkBridge.send('VKWebAppInit')
      .then(() => vkBridge.send('VKWebAppGetUserInfo'))
      .then(data => {
        currentPlayer.id = data.id;
        updateInfo(`Привет, ${data.first_name}!`);
        return fetch(`${SERVER_URL}/join`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({userId: data.id}) });
      })
      .then(r => r.json())
      .then(state => {
        currentPlayer.color = state.player.color;
        currentPlayer.spawnX = state.player.spawnX; currentPlayer.spawnY = state.player.spawnY;
        MAP_W = state.worldW || MAP_W; MAP_H = state.worldH || MAP_H;
        leaderboard = state.leaderboard || [];
        applyServerResponse(state, null);
        if (!currentPlayer.hashtag && !spectating) {
          const taken = Object.values(playersInfo).map(p => p.hashtag).filter(Boolean);
          showSelection(AVAILABLE_HASHTAGS || [], taken);
        }
        resizeCanvas();
      })
      .catch(err => { updateInfo('Ошибка: '+err); console.error(err); });

    setInterval(fetchState, 10000);
    resizeCanvas();
    drawMap();

    const AVAILABLE_HASHTAGS = [
      'Azur_lane', 'Girls_Frontline', 'Arknights', 'Fate',
      'Genshin_Impact', 'Hololive', 'Blue_Archive', 'Uma_Musume',
      'Honkai_Impact', 'Princess_Connect', 'ZenlessZoneZero', 'NIKKE',
      'HonkaiStarRail', 'WutheringWaves', 'BrownDust2', 'Neverness_to_Everness'
    ];
  </script>
</body>
</html>
